# smart-crawler —— NAS 一键部署
# 用法： docker compose up -d   →   http://<NAS-IP>:8077
services:
  # PostgreSQL —— 服务化部署主数据库（替代 SQLite）
  postgres:
    image: postgres:16-alpine
    container_name: smart-crawler-pg
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=4GB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - wal_level=replica
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-smart_crawler}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-smart_crawler}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data   # 数据卷持久化
    # 仅容器网络内访问；如需宿主机调试可临时打开 ports
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_crawler} -d ${POSTGRES_DB:-smart_crawler}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-crawler-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  smart-crawler:
    build: .
    image: smart-crawler:latest
    container_name: smart-crawler
    restart: unless-stopped
    ports:
      - "8077:8077"
    volumes:
      - ./data:/app/data            # 数据持久化（迁移脚本 / SQLite 备份等）
      - ./backend:/app/backend:ro   # 热加载后端代码（不必 rebuild image）
      - ./frontend:/app/frontend:ro # 热加载前端（home.html / index.html）
      - ./frontend-app/dist:/app/frontend-app/dist:ro # 热加载新版前台 SPA 静态产物
      - ./admin-app/dist:/app/admin-app/dist:ro # 热加载超管后台静态产物
      - ./deliverables:/app/deliverables   # /d/* 路由提供静态托管，替代外部 CDN
    environment:
      # 连接 postgres 服务；服务名 postgres 即容器网络内的主机名
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - SC_SECRET=${SC_SECRET:-change-me}
      # 管理员账号 —— 弱口令 aosen/admin 已废弃，密码经环境变量注入
      # ADMIN_PASSWORD 只在首次建号时生效；控制台改过的密码不会被部署覆盖。
      # 忘记密码需重置时：临时加 ADMIN_PASSWORD_FORCE_RESET=1 启动一次。
      - ADMIN_USERNAME=${ADMIN_USERNAME:-aosen}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      # Web 容器保留 FastAPI + scheduler；采集执行交给独立 worker 容器，避免
      # 页面触发的 job 只入队但无人消费。
      - WORKER_THREADS=${WORKER_THREADS:-0}
      - RESIDENTIAL_PROXY=${RESIDENTIAL_PROXY:-}
      - HOMARY_LIMIT=${HOMARY_LIMIT:-999999}
      - COSTWAY_PAGES_PER_CAT=${COSTWAY_PAGES_PER_CAT:-999999}
      - VIDAXL_LIMIT=${VIDAXL_LIMIT:-999999}
      - IKEA_LIMIT=${IKEA_LIMIT:-999999}
      - IKEA_USE_STEALTH=${IKEA_USE_STEALTH:-0}
      - WAYFAIR_USE_STEALTH=${WAYFAIR_USE_STEALTH:-0}
      - BESTBUY_LIMIT=${BESTBUY_LIMIT:-200}
      - EBAY_LIMIT=${EBAY_LIMIT:-200}
      - OTTO_LIMIT=${OTTO_LIMIT:-200}
      - TARGET_LIMIT=${TARGET_LIMIT:-200}
      # LLM 网关 —— flatkey.ai Anthropic 兼容端点（2026-05-21 更新）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.flatkey.ai}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5}
      - VOC_API_KEY=${VOC_API_KEY:-}      # Amazon VOC 工具用 —— apps.voc.ai/openapi
      - AMAZON_VOC_TOKEN=${AMAZON_VOC_TOKEN:-}
      - AMAZON_VOC_PUBLIC_BASE_URL=${AMAZON_VOC_PUBLIC_BASE_URL:-}
      - AMAZON_VOC_REDIS_URL=${AMAZON_VOC_REDIS_URL:-redis://redis:6379/0}
      - AMAZON_VOC_QUEUE_PREFIX=${AMAZON_VOC_QUEUE_PREFIX:-amazon:voc}
      - AMAZON_VOC_RESULT_PREFIX=${AMAZON_VOC_RESULT_PREFIX:-crawler-data}
      - AMAZON_VOC_DEFAULT_TENANT=${AMAZON_VOC_DEFAULT_TENANT:-default}
      - AMAZON_VOC_CALLBACK_SECRET=${AMAZON_VOC_CALLBACK_SECRET:-}
      - AMAZON_VOC_OSS_ENDPOINT=${AMAZON_VOC_OSS_ENDPOINT:-}
      - AMAZON_VOC_OSS_BUCKET=${AMAZON_VOC_OSS_BUCKET:-}
      - AMAZON_VOC_OSS_ACCESS_KEY_ID=${AMAZON_VOC_OSS_ACCESS_KEY_ID:-}
      - AMAZON_VOC_OSS_ACCESS_KEY_SECRET=${AMAZON_VOC_OSS_ACCESS_KEY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # worker 副本 —— 不跑 FastAPI/scheduler，专跑 worker loop，连同一 PG。
  # worker_1 只处理页面/人工触发任务，避免被凌晨 scheduled backlog 卡住。
  # worker_3/4 为扩容 worker：docker compose --profile workers up -d 启用。
  worker_1: &worker_template
    build: .
    image: smart-crawler:latest
    container_name: smart-crawler-worker-1
    restart: unless-stopped
    command: python -m app.worker
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend:ro                 # 热加载新 crawler 代码
      - ./deliverables:/app/deliverables
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - RUN_SCHEDULER=0
      - MEM_GATE_THRESHOLD=${MEM_GATE_THRESHOLD:-95}
      - WORKER_ID=worker-1
      - NODE_ID=nas
      - WORKER_ASSIGNED_ONLY=1
      - TRIGGER_ALLOWLIST=manual,tracking_add,admin_quality_rerun,admin_retry
      - RESIDENTIAL_PROXY=${RESIDENTIAL_PROXY:-}
      - HOMARY_LIMIT=${HOMARY_LIMIT:-999999}
      - COSTWAY_PAGES_PER_CAT=${COSTWAY_PAGES_PER_CAT:-999999}
      - VIDAXL_LIMIT=${VIDAXL_LIMIT:-999999}
      - IKEA_LIMIT=${IKEA_LIMIT:-999999}
      - IKEA_USE_STEALTH=${IKEA_USE_STEALTH:-0}
      - WAYFAIR_USE_STEALTH=${WAYFAIR_USE_STEALTH:-0}
      - BESTBUY_LIMIT=${BESTBUY_LIMIT:-200}
      - EBAY_LIMIT=${EBAY_LIMIT:-200}
      - OTTO_LIMIT=${OTTO_LIMIT:-200}
      - TARGET_LIMIT=${TARGET_LIMIT:-200}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.flatkey.ai}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5}
    depends_on:
      postgres:
        condition: service_healthy

  worker_2:
    <<: *worker_template
    container_name: smart-crawler-worker-2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - RUN_SCHEDULER=0

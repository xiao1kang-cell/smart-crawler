# smart-crawler —— NAS 一键部署
# 用法： docker compose up -d   →   http://<NAS-IP>:8077
services:
  # PostgreSQL —— 服务化部署主数据库（替代 SQLite）
  postgres:
    image: postgres:16-alpine
    container_name: smart-crawler-pg
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-smart_crawler}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-smart_crawler}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data   # 数据卷持久化
    # 仅容器网络内访问；如需宿主机调试可临时打开 ports
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_crawler} -d ${POSTGRES_DB:-smart_crawler}"]
      interval: 10s
      timeout: 5s
      retries: 5

  smart-crawler:
    build: .
    image: smart-crawler:latest
    container_name: smart-crawler
    restart: unless-stopped
    ports:
      - "8077:8077"
    volumes:
      - ./data:/app/data            # 数据持久化（迁移脚本 / SQLite 备份等）
      - ./backend/sites.yaml:/app/backend/sites.yaml:ro
      - ./backend/proxies.txt:/app/backend/proxies.txt:ro
    environment:
      # 连接 postgres 服务；服务名 postgres 即容器网络内的主机名
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - SC_SECRET=${SC_SECRET:-change-me}
      # 管理员账号 —— 弱口令 aosen/admin 已废弃，密码经环境变量注入
      - ADMIN_USERNAME=${ADMIN_USERNAME:-aosen}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - RESIDENTIAL_PROXY=${RESIDENTIAL_PROXY:-}
      - HOMARY_LIMIT=${HOMARY_LIMIT:-500}
      - COSTWAY_PAGES_PER_CAT=${COSTWAY_PAGES_PER_CAT:-50}
      - VIDAXL_LIMIT=${VIDAXL_LIMIT:-5000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://router.flatkey.ai/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-5-mini}
      - VOC_API_KEY=${VOC_API_KEY:-}      # Amazon VOC 工具用 —— apps.voc.ai/openapi
    depends_on:
      postgres:
        condition: service_healthy

  # Cloudflare Tunnel —— 把 smartcrawler.io 接到本容器（需填 TUNNEL_TOKEN）
  # 在 Cloudflare Zero Trust 创建 Tunnel 后，把 token 写入 .env 再启用本段
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smart-crawler-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - smart-crawler
    profiles: ["tunnel"]            # docker compose --profile tunnel up -d 才启用

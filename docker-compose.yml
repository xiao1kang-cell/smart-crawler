      - AMAZON_VOC_CALLBACK_SECRET=${AMAZON_VOC_CALLBACK_SECRET:-}
      - AMAZON_VOC_CALLBACK_RETRY_INTERVAL_SECONDS=${AMAZON_VOC_CALLBACK_RETRY_INTERVAL_SECONDS:-60}
      - AMAZON_VOC_CALLBACK_RETRY_MIN_INTERVAL_SECONDS=${AMAZON_VOC_CALLBACK_RETRY_MIN_INTERVAL_SECONDS:-300}
      - AMAZON_VOC_CALLBACK_RETRY_MAX_ATTEMPTS=${AMAZON_VOC_CALLBACK_RETRY_MAX_ATTEMPTS:-5}
      - AMAZON_VOC_CALLBACK_RETRY_BATCH_SIZE=${AMAZON_VOC_CALLBACK_RETRY_BATCH_SIZE:-50}

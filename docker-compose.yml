    image: cloudflare/cloudflared:latest
    container_name: smart-crawler-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - smart-crawler
    profiles: ["tunnel"]            # docker compose --profile tunnel up -d 才启用

      - IKEA_USE_STEALTH=${IKEA_USE_STEALTH:-0}
      - WAYFAIR_USE_STEALTH=${WAYFAIR_USE_STEALTH:-0}
      - BESTBUY_LIMIT=${BESTBUY_LIMIT:-200}
      - EBAY_LIMIT=${EBAY_LIMIT:-200}
      - OTTO_LIMIT=${OTTO_LIMIT:-200}
      - TARGET_LIMIT=${TARGET_LIMIT:-200}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.flatkey.ai}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5}

  worker_dispatcher:
    <<: *worker_template
    container_name: smart-crawler-dispatcher
    profiles: ["workers"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - RUN_SCHEDULER=0
      - WORKER_ID=worker-dispatcher
      - NODE_ID=nas
      - WORKER_DISTRIBUTOR_ONLY=1
      - WORKER_DISTRIBUTOR_NODES=${WORKER_DISTRIBUTOR_NODES:-nas:6:18,US-macmini1:4:8,US-macmini4:4:8}
      - WORKER_DISTRIBUTOR_BATCH=${WORKER_DISTRIBUTOR_BATCH:-200}
      - WORKER_ASSIGNMENT_STALE_SECONDS=${WORKER_ASSIGNMENT_STALE_SECONDS:-300}
      - WORKER_POLL=${WORKER_DISTRIBUTOR_POLL:-10}


      - AMAZON_VOC_WORKER_JOB_TYPES=${AMAZON_VOC_WORKER_JOB_TYPES:-}
      - AMAZON_VOC_WORKER_MARKETS=${AMAZON_VOC_WORKER_MARKETS:-}
      - AMAZON_VOC_WORKER_EXCLUDE_MARKETS=${AMAZON_VOC_WORKER_EXCLUDE_MARKETS:-}
      - AMAZON_VOC_REDIS_URL=${AMAZON_VOC_REDIS_URL:-redis://redis:6379/0}
      - AMAZON_VOC_PUBLIC_BASE_URL=${AMAZON_VOC_PUBLIC_BASE_URL:-}
      - AMAZON_VOC_QUEUE_PREFIX=${AMAZON_VOC_QUEUE_PREFIX:-amazon:voc}
      - AMAZON_VOC_RESULT_PREFIX=${AMAZON_VOC_RESULT_PREFIX:-crawler-data}
      - AMAZON_VOC_DEFAULT_TENANT=${AMAZON_VOC_DEFAULT_TENANT:-default}
      - AMAZON_VOC_CALLBACK_SECRET=${AMAZON_VOC_CALLBACK_SECRET:-}
      - AMAZON_VOC_OSS_ENDPOINT=${AMAZON_VOC_OSS_ENDPOINT:-}
      - AMAZON_VOC_OSS_BUCKET=${AMAZON_VOC_OSS_BUCKET:-}
      - AMAZON_VOC_OSS_ACCESS_KEY_ID=${AMAZON_VOC_OSS_ACCESS_KEY_ID:-}
      - AMAZON_VOC_OSS_ACCESS_KEY_SECRET=${AMAZON_VOC_OSS_ACCESS_KEY_SECRET:-}
      - RESIDENTIAL_PROXY=${RESIDENTIAL_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  amazon_voc_daemon:
    build: .

# smart-crawler вҖ”вҖ” NAS дёҖй”®йғЁзҪІ
# з”Ёжі•пјҡ docker compose up -d   вҶ’   http://<NAS-IP>:8077
services:
  # PostgreSQL вҖ”вҖ” жңҚеҠЎеҢ–йғЁзҪІдё»ж•°жҚ®еә“пјҲжӣҝд»Ј SQLiteпјү
  postgres:
    image: postgres:16-alpine
    container_name: smart-crawler-pg
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-smart_crawler}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-smart_crawler}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data   # ж•°жҚ®еҚ·жҢҒд№…еҢ–
    # д»…е®№еҷЁзҪ‘з»ңеҶ…и®ҝй—®пјӣеҰӮйңҖе®ҝдё»жңәи°ғиҜ•еҸҜдёҙж—¶жү“ејҖ ports
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_crawler} -d ${POSTGRES_DB:-smart_crawler}"]
      interval: 10s
      timeout: 5s
      retries: 5

  smart-crawler:
    build: .
    image: smart-crawler:latest
    container_name: smart-crawler
    restart: unless-stopped
    ports:
      - "8077:8077"
    volumes:
      - ./data:/app/data            # ж•°жҚ®жҢҒд№…еҢ–пјҲиҝҒз§»и„ҡжң¬ / SQLite еӨҮд»Ҫзӯүпјү
      - ./backend:/app/backend:ro   # зғӯеҠ иҪҪеҗҺз«Ҝд»Јз ҒпјҲдёҚеҝ… rebuild imageпјү
      - ./frontend:/app/frontend:ro # зғӯеҠ иҪҪеүҚз«ҜпјҲhome.html / index.htmlпјү
      - ./frontend-app/dist:/app/frontend-app/dist:ro # зғӯеҠ иҪҪж–°зүҲеүҚеҸ° SPA йқҷжҖҒдә§зү©
      - ./admin-app/dist:/app/admin-app/dist:ro # зғӯеҠ иҪҪи¶…з®ЎеҗҺеҸ°йқҷжҖҒдә§зү©
      - ./deliverables:/app/deliverables   # /d/* и·Ҝз”ұжҸҗдҫӣйқҷжҖҒжүҳз®ЎпјҢжӣҝд»ЈеӨ–йғЁ CDN
    environment:
      # иҝһжҺҘ postgres жңҚеҠЎпјӣжңҚеҠЎеҗҚ postgres еҚіе®№еҷЁзҪ‘з»ңеҶ…зҡ„дё»жңәеҗҚ
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - SC_SECRET=${SC_SECRET:-change-me}
      # з®ЎзҗҶе‘ҳиҙҰеҸ· вҖ”вҖ” ејұеҸЈд»Ө aosen/admin е·ІеәҹејғпјҢеҜҶз Ғз»ҸзҺҜеўғеҸҳйҮҸжіЁе…Ҙ
      # ADMIN_PASSWORD еҸӘеңЁйҰ–ж¬Ўе»әеҸ·ж—¶з”ҹж•ҲпјӣжҺ§еҲ¶еҸ°ж”№иҝҮзҡ„еҜҶз ҒдёҚдјҡиў«йғЁзҪІиҰҶзӣ–гҖӮ
      # еҝҳи®°еҜҶз ҒйңҖйҮҚзҪ®ж—¶пјҡдёҙж—¶еҠ  ADMIN_PASSWORD_FORCE_RESET=1 еҗҜеҠЁдёҖж¬ЎгҖӮ
      - ADMIN_USERNAME=${ADMIN_USERNAME:-aosen}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      # Web е®№еҷЁдҝқз•ҷ FastAPI + schedulerпјӣйҮҮйӣҶжү§иЎҢдәӨз»ҷзӢ¬з«Ӣ worker е®№еҷЁпјҢйҒҝе…Қ
      # йЎөйқўи§ҰеҸ‘зҡ„ job еҸӘе…ҘйҳҹдҪҶж— дәәж¶Ҳиҙ№гҖӮ
      - WORKER_THREADS=${WORKER_THREADS:-0}
      - RESIDENTIAL_PROXY=${RESIDENTIAL_PROXY:-}
      - HOMARY_LIMIT=${HOMARY_LIMIT:-999999}
      - COSTWAY_PAGES_PER_CAT=${COSTWAY_PAGES_PER_CAT:-999999}
      - VIDAXL_LIMIT=${VIDAXL_LIMIT:-999999}
      - IKEA_LIMIT=${IKEA_LIMIT:-999999}
      - IKEA_USE_STEALTH=${IKEA_USE_STEALTH:-0}
      - WAYFAIR_USE_STEALTH=${WAYFAIR_USE_STEALTH:-0}
      - BESTBUY_LIMIT=${BESTBUY_LIMIT:-200}
      - EBAY_LIMIT=${EBAY_LIMIT:-200}
      - OTTO_LIMIT=${OTTO_LIMIT:-200}
      - TARGET_LIMIT=${TARGET_LIMIT:-200}
      # LLM зҪ‘е…і вҖ”вҖ” flatkey.ai Anthropic е…је®№з«ҜзӮ№пјҲ2026-05-21 жӣҙж–°пјү
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.flatkey.ai}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5}
      - VOC_API_KEY=${VOC_API_KEY:-}      # Amazon VOC е·Ҙе…·з”Ё вҖ”вҖ” apps.voc.ai/openapi
    depends_on:
      postgres:
        condition: service_healthy

  # worker еүҜжң¬ вҖ”вҖ” дёҚи·‘ FastAPI/schedulerпјҢдё“и·‘ worker loopпјҢиҝһеҗҢдёҖ PGгҖӮ
  # worker_1 еҸӘеӨ„зҗҶйЎөйқў/дәәе·Ҙи§ҰеҸ‘д»»еҠЎпјҢйҒҝе…Қиў«еҮҢжҷЁ scheduled backlog еҚЎдҪҸгҖӮ
  # worker_3/4 дёәжү©е®№ workerпјҡdocker compose --profile workers up -d еҗҜз”ЁгҖӮ
  worker_1: &worker_template
    build: .
    image: smart-crawler:latest
    container_name: smart-crawler-worker-1
    restart: unless-stopped
    command: python -m app.worker
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend:ro                 # зғӯеҠ иҪҪж–° crawler д»Јз Ғ
      - ./deliverables:/app/deliverables
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}
      - RUN_SCHEDULER=0
      - MEM_GATE_THRESHOLD=${MEM_GATE_THRESHOLD:-95}
      - WORKER_ID=worker-1
      - NODE_ID=nas
      - WORKER_ASSIGNED_ONLY=1
      - TRIGGER_ALLOWLIST=manual,tracking_add,admin_quality_rerun,admin_retry
      - RESIDENTIAL_PROXY=${RESIDENTIAL_PROXY:-}
      - HOMARY_LIMIT=${HOMARY_LIMIT:-999999}
      - COSTWAY_PAGES_PER_CAT=${COSTWAY_PAGES_PER_CAT:-999999}
      - VIDAXL_LIMIT=${VIDAXL_LIMIT:-999999}
      - IKEA_LIMIT=${IKEA_LIMIT:-999999}
      - IKEA_USE_STEALTH=${IKEA_USE_STEALTH:-0}
      - WAYFAIR_USE_STEALTH=${WAYFAIR_USE_STEALTH:-0}
      - BESTBUY_LIMIT=${BESTBUY_LIMIT:-200}
      - EBAY_LIMIT=${EBAY_LIMIT:-200}
      - OTTO_LIMIT=${OTTO_LIMIT:-200}
      - TARGET_LIMIT=${TARGET_LIMIT:-200}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.flatkey.ai}
      - LLM_MODEL=${LLM_MODEL:-claude-haiku-4-5}
    depends_on:
      postgres:
        condition: service_healthy

  worker_2:
    <<: *worker_template
    container_name: smart-crawler-worker-2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-smart_crawler}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-smart_crawler}}

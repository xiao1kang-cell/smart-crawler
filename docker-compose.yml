  # Cloudflare Tunnel вҖ”вҖ” жҠҠ smartcrawler.io жҺҘеҲ°жң¬е®№еҷЁпјҲйңҖеЎ« TUNNEL_TOKENпјү
  # еңЁ Cloudflare Zero Trust еҲӣе»ә Tunnel еҗҺпјҢжҠҠ token еҶҷе…Ҙ .env еҶҚеҗҜз”Ёжң¬ж®ө
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smart-crawler-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - smart-crawler
    profiles: ["tunnel"]            # docker compose --profile tunnel up -d жүҚеҗҜз”Ё

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>smart-crawler · 统一客户产品界面 · v7</title>
<script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif}
html,body{background:#0a0612;color:#e5e7eb;font-size:14px;line-height:1.55;min-height:100vh}
a{color:#a78bfa;text-decoration:none}
button{font-family:inherit}

/* ============= 顶部说明栏 (only in demo, real product 没有) ============= */
.demo-bar{background:linear-gradient(90deg,rgba(247,183,49,.15),rgba(167,139,250,.10));border-bottom:1px solid rgba(247,183,49,.3);padding:9px 22px;text-align:center;font-size:0.78rem;color:#fcd34d}
.demo-bar b{color:#fff}
.demo-bar .switcher{margin-left:14px;display:inline-flex;gap:5px}
.demo-bar .switcher button{padding:3px 11px;border-radius:7px;font-size:0.74rem;font-weight:700;cursor:pointer;border:1px solid rgba(247,183,49,.4);background:transparent;color:#fcd34d}
.demo-bar .switcher button:hover{background:rgba(247,183,49,.15)}
.demo-bar .switcher button.active{background:#fcd34d;color:#0a0612}

/* ============= TOP BAR ============= */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,6,18,.94);backdrop-filter:blur(12px);border-bottom:1px solid #29213a;padding:11px 22px;display:flex;align-items:center;gap:16px}
.brand{font-weight:900;letter-spacing:-0.4px;font-size:1.05rem;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.workspace{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 7px;border-radius:8px;background:#13111f;border:1px solid #29213a;cursor:pointer;font-size:0.82rem;transition:all .15s}
.workspace:hover{border-color:#a78bfa}
.workspace .ws-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;color:#fff;flex-shrink:0}
.workspace .ws-name{font-weight:700}
.workspace .ws-arrow{color:#52527a;font-size:0.7rem;margin-left:3px}

.tab-row{display:flex;gap:4px;flex:1}
.tab{padding:8px 14px;border-radius:8px;font-size:0.84rem;color:#94a3b8;cursor:pointer;font-weight:600;border:none;background:transparent;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab:hover{background:rgba(167,139,250,.08);color:#c4b5fd}
.tab.active{background:rgba(167,139,250,.16);color:#fff;box-shadow:inset 0 -2px 0 #a78bfa}

.usage-strip{font-size:0.74rem;color:#94a3b8;padding:5px 12px;border-radius:8px;background:rgba(16,185,129,.10);border:1px solid rgba(16,185,129,.25)}
.usage-strip b{color:#6ee7b7;font-weight:700}
.icon-btn{padding:7px 9px;border-radius:8px;color:#94a3b8;cursor:pointer;border:1px solid #29213a;background:#13111f;font-size:0.84rem;position:relative}
.icon-btn:hover{background:rgba(167,139,250,.10);color:#c4b5fd}
.icon-btn .badge{position:absolute;top:-4px;right:-4px;background:#fb7185;color:#fff;font-size:0.58rem;border-radius:9px;padding:1px 5px;font-weight:700;min-width:14px;text-align:center}

.acct{display:flex;align-items:center;gap:8px;padding:5px 11px 5px 5px;border-radius:8px;background:#13111f;border:1px solid #29213a;font-size:0.78rem;cursor:pointer}
.acct .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#f472b6);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:#fff}

/* ============= LAYOUT ============= */
.page{max-width:1380px;margin:0 auto;padding:20px 22px 50px}
.lead{font-size:1.7rem;font-weight:900;letter-spacing:-0.6px;margin-bottom:5px}
.lead .ws-tag{font-size:0.74rem;background:rgba(167,139,250,.14);color:#c4b5fd;border:1px solid rgba(167,139,250,.3);padding:3px 10px;border-radius:8px;font-weight:700;margin-left:10px;vertical-align:middle}
.sub{font-size:0.86rem;color:#94a3b8;margin-bottom:16px}

/* ============= STATS HERO ============= */
.stats-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:11px;margin-bottom:18px}
.stat{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:13px 16px}
.stat .lbl{font-size:0.66rem;color:#52527a;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;font-weight:700}
.stat .val{font-size:1.55rem;font-weight:900;color:#fff;letter-spacing:-0.4px}
.stat .delta{font-size:0.72rem;color:#6ee7b7;margin-top:2px}
.stat .delta.down{color:#fda4af}

/* ============= ASK ============= */
.ask-shell{display:grid;grid-template-columns:200px 1fr 260px;gap:16px;align-items:flex-start}
.ask-history{background:#13111f;border:1px solid #29213a;border-radius:12px;padding:13px;font-size:0.8rem}
.ask-history h4{font-size:0.66rem;color:#52527a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.ask-history .item{padding:7px 9px;border-radius:6px;color:#cbd5e1;cursor:pointer;margin-bottom:3px;border-left:2px solid transparent;font-size:0.78rem}
.ask-history .item:hover{background:rgba(167,139,250,.08);border-left-color:#a78bfa}
.ask-history .item .time{font-size:0.64rem;color:#52527a;margin-top:2px}

.ask-main{display:flex;flex-direction:column;gap:12px}
.ask-input{background:#13111f;border:2px solid #29213a;border-radius:12px;padding:12px 14px;transition:border-color .15s}
.ask-input:focus-within{border-color:#a78bfa;box-shadow:0 0 0 4px rgba(167,139,250,.10)}
.ask-input textarea{width:100%;background:transparent;border:none;outline:none;color:#fff;font-size:0.94rem;resize:none;min-height:38px;font-family:inherit}
.ask-input textarea::placeholder{color:#52527a}
.ask-input-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:0.7rem;color:#52527a}
.kbd{background:#0a0612;border:1px solid #29213a;border-radius:4px;padding:1px 5px;font-family:'SF Mono',monospace;font-size:0.66rem}
.btn-go{background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;border:none;padding:6px 16px;border-radius:7px;font-size:0.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-go:disabled{opacity:.45;cursor:not-allowed}

.starters{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.starter{background:#13111f;border:1px solid #29213a;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s}
.starter:hover{border-color:#a78bfa;transform:translateY(-2px);box-shadow:0 12px 28px rgba(167,139,250,.18)}
.starter .icon{font-size:1.2rem;margin-bottom:5px}
.starter .title{font-size:0.84rem;font-weight:700;color:#fff;margin-bottom:3px}
.starter .desc{font-size:0.72rem;color:#94a3b8;line-height:1.45}

.result-card{background:#13111f;border:1px solid #29213a;border-radius:12px;overflow:hidden}
.result-head{padding:11px 14px;border-bottom:1px solid #1f1429;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
.result-meta{color:#94a3b8;font-size:0.72rem;display:flex;gap:12px}
.result-meta b{color:#c4b5fd}
.result-actions{display:flex;gap:5px}
.result-actions button{padding:4px 10px;border-radius:6px;background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.25);color:#c4b5fd;font-size:0.72rem;font-weight:600;cursor:pointer}
.result-actions button:hover{background:rgba(167,139,250,.18)}

.result-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.result-table th{text-align:left;padding:8px 13px;background:#0d0a17;color:#52527a;font-size:0.64rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;border-bottom:1px solid #1f1429}
.result-table td{padding:10px 13px;border-bottom:1px solid #1f1429;color:#cbd5e1;vertical-align:middle}
.result-table tr.streaming{background:rgba(167,139,250,.06);animation:streamIn .5s ease}
@keyframes streamIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.result-table tr:hover{background:rgba(167,139,250,.05)}

.pill{display:inline-flex;align-items:center;gap:3px;font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:9px;letter-spacing:0.3px}
.pill.ok{background:rgba(16,185,129,.14);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.pill.warn{background:rgba(247,183,49,.14);color:#fcd34d;border:1px solid rgba(247,183,49,.3)}
.pill.bad{background:rgba(251,113,133,.14);color:#fda4af;border:1px solid rgba(251,113,133,.3)}
.pill.pending{background:rgba(96,165,250,.14);color:#93c5fd;border:1px solid rgba(96,165,250,.3)}

.trace{background:#13111f;border:1px solid #29213a;border-radius:12px;padding:13px 14px;font-size:0.76rem}
.trace h4{font-size:0.66rem;color:#52527a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.trace .step{padding:6px 8px;border-radius:5px;margin-bottom:4px;background:#0d0a17;display:flex;gap:8px;align-items:flex-start}
.trace .step .dot{width:5px;height:5px;border-radius:50%;background:#10b981;margin-top:6px;flex-shrink:0}
.trace .step .body{flex:1;font-size:0.72rem;color:#cbd5e1;line-height:1.5}
.trace .step .body b{color:#c4b5fd}
.trace .step .body code{background:rgba(167,139,250,.10);padding:1px 5px;border-radius:3px;font-family:'SF Mono',monospace;font-size:0.7rem;color:#a78bfa}

/* ============= CATALOG ============= */
.cat-filters{display:flex;gap:8px;flex-wrap:wrap;background:#13111f;border:1px solid #29213a;border-radius:11px;padding:11px 12px;margin-bottom:12px}
.cat-filters select,.cat-filters input{background:#0d0a17;border:1px solid #29213a;border-radius:6px;padding:6px 10px;color:#cbd5e1;font-size:0.8rem;outline:none}
.cat-filters select:focus,.cat-filters input:focus{border-color:#a78bfa}

.cat-table-wrap{background:#13111f;border:1px solid #29213a;border-radius:12px;overflow:hidden}
.cat-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.cat-table th{text-align:left;padding:8px 12px;background:#0d0a17;color:#52527a;font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;border-bottom:1px solid #1f1429}
.cat-table td{padding:9px 12px;border-bottom:1px solid #1f1429;color:#cbd5e1}
.cat-table tr:hover{background:rgba(167,139,250,.05)}
.cell{position:relative;display:inline-flex;gap:5px;align-items:center;cursor:default}
.cell.clickable{cursor:pointer}
.cell.clickable:hover{text-decoration:underline}
.cell .tip{display:none;position:absolute;bottom:calc(100% + 5px);left:0;background:#0a0612;border:1px solid #a78bfa;border-radius:8px;padding:9px 12px;font-size:0.7rem;color:#cbd5e1;white-space:nowrap;z-index:50;box-shadow:0 12px 36px rgba(0,0,0,.6);min-width:230px}
.cell:hover .tip{display:block}
.tip .tip-row{display:flex;gap:8px;margin-bottom:3px;align-items:center}
.tip .tip-row .k{color:#52527a;width:74px;font-size:0.64rem;letter-spacing:.5px;text-transform:uppercase}
.tip .tip-row .v{color:#cbd5e1;font-size:0.72rem}
.tip .src-url{color:#a78bfa;text-decoration:underline;font-size:0.66rem;font-family:'SF Mono',monospace}
.thumb{width:28px;height:28px;border-radius:5px;background:linear-gradient(135deg,#475569,#1f2937);display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}

/* drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;justify-content:flex-end;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.drawer{width:480px;max-width:95vw;background:#0d0a17;border-left:1px solid #29213a;height:100vh;overflow-y:auto;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-head{padding:18px 22px;border-bottom:1px solid #29213a;display:flex;justify-content:space-between;align-items:center}
.drawer-head h3{font-size:1.05rem;font-weight:800}
.drawer-head .close{background:transparent;border:1px solid #29213a;color:#94a3b8;border-radius:7px;padding:4px 9px;cursor:pointer}
.drawer-body{padding:18px 22px}
.evidence-block{background:#13111f;border:1px solid #29213a;border-radius:10px;padding:14px;margin-bottom:13px}
.evidence-block h5{font-size:0.66rem;color:#52527a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.evidence-block .screenshot{background:#0a0612;border:1px dashed #29213a;border-radius:7px;height:100px;display:flex;align-items:center;justify-content:center;color:#52527a;font-size:0.78rem;margin-bottom:8px}
.evidence-block .meta-row{display:flex;justify-content:space-between;padding:4px 0;font-size:0.78rem;color:#cbd5e1;border-bottom:1px solid #1f1429}
.evidence-block .meta-row:last-child{border:none}
.evidence-block .meta-row .k{color:#52527a;font-size:0.72rem}
.evidence-block code{font-family:'SF Mono',monospace;font-size:0.74rem;color:#a78bfa}

/* ============= VOC ============= */
.voc-shell{display:grid;grid-template-columns:230px 1fr;gap:14px;align-items:flex-start}
.voc-sidebar{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:12px;max-height:75vh;overflow-y:auto}
.voc-sidebar h4{font-size:0.64rem;color:#52527a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.sku-pick{padding:7px 9px;border-radius:6px;cursor:pointer;font-size:0.76rem;color:#cbd5e1;display:flex;justify-content:space-between;align-items:center;border-left:2px solid transparent;margin-bottom:3px}
.sku-pick:hover{background:rgba(167,139,250,.08)}
.sku-pick.active{background:rgba(167,139,250,.15);color:#fff;border-left-color:#a78bfa}
.sku-pick .site-name{font-size:0.62rem;color:#52527a}

.voc-detail{background:#13111f;border:1px solid #29213a;border-radius:12px;overflow:hidden}
.voc-head{padding:16px 20px;border-bottom:1px solid #1f1429;background:linear-gradient(135deg,rgba(167,139,250,.10),transparent)}
.voc-head .name{font-size:1.15rem;font-weight:800;color:#fff;margin-bottom:4px}
.voc-head .meta{font-size:0.76rem;color:#94a3b8;display:flex;gap:12px}
.voc-head .meta b{color:#c4b5fd}
.voc-cards{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.voc-block{background:#0d0a17;border:1px solid #29213a;border-radius:10px;padding:14px 16px}
.voc-block h5{font-size:0.7rem;color:#fcd34d;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.voc-block h5 .actions{display:flex;gap:4px}
.voc-block h5 .actions button{background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.20);color:#a78bfa;font-size:0.58rem;padding:2px 6px;border-radius:4px;cursor:pointer;font-weight:600}
.voc-block h5 .actions button:hover{background:rgba(167,139,250,.20)}

.complaint{padding:8px 0;border-bottom:1px solid #1f1429}
.complaint:last-child{border:none}
.complaint .theme{font-weight:700;color:#fff;font-size:0.82rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.complaint .theme .share{font-size:0.68rem;color:#fda4af;font-weight:700}
.complaint .quote{font-size:0.72rem;color:#94a3b8;font-style:italic;line-height:1.5;border-left:2px solid #fda4af;padding-left:7px}
.complaint .bar{height:4px;background:#1f1429;border-radius:3px;margin-top:5px;overflow:hidden}
.complaint .bar div{height:100%;background:linear-gradient(90deg,#fb7185,#fda4af)}

.kw-cloud{display:flex;flex-wrap:wrap;gap:5px}
.kw{padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600}
.kw.pos{background:rgba(16,185,129,.14);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.kw.neg{background:rgba(251,113,133,.14);color:#fda4af;border:1px solid rgba(251,113,133,.3)}
.kw.neu{background:rgba(96,165,250,.14);color:#93c5fd;border:1px solid rgba(96,165,250,.3)}

.compare-row{padding:7px 0;border-bottom:1px solid #1f1429;display:grid;grid-template-columns:80px 1fr 60px;gap:8px;align-items:center;font-size:0.76rem}
.compare-row:last-child{border:none}
.compare-row .site{font-weight:700;color:#c4b5fd}
.compare-row .info{color:#cbd5e1}
.compare-row .info span{color:#52527a;font-size:0.68rem;margin-left:4px}
.compare-row .delta.dn{color:#6ee7b7;font-weight:700}
.compare-row .delta.up{color:#fda4af;font-weight:700}

.recs li{padding:7px 0;border-bottom:1px solid #1f1429;color:#cbd5e1;font-size:0.8rem;line-height:1.55;list-style:none;display:flex;gap:7px}
.recs li:last-child{border:none}
.recs li::before{content:'💡';flex-shrink:0}
.recs li b{color:#fff}

.voc-foot{padding:13px 20px;background:#080614;border-top:1px solid #1f1429;display:flex;justify-content:space-between;align-items:center;font-size:0.76rem}
.voc-foot .cost{color:#52527a}
.voc-foot .cost b{color:#fcd34d}
.voc-foot button{padding:7px 13px;border-radius:6px;background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.25);color:#c4b5fd;font-weight:600;cursor:pointer;font-size:0.76rem}
.voc-foot button:hover{background:rgba(167,139,250,.20)}

/* ============= COMPETITORS (workspace-specific) ============= */
.competitor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px}
.comp-tile{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:12px 14px;cursor:default}
.comp-tile h6{font-size:0.84rem;font-weight:800;color:#fff;margin-bottom:3px}
.comp-tile .ctry{font-size:0.64rem;color:#52527a;letter-spacing:1px;margin-bottom:6px}
.comp-tile .num{font-size:1.3rem;font-weight:900;color:#c4b5fd;margin-bottom:2px}
.comp-tile .pct{font-size:0.72rem;color:#94a3b8;margin-bottom:6px}
.comp-tile .bar{height:4px;background:#29213a;border-radius:3px;overflow:hidden}
.comp-tile .bar div{height:100%;background:linear-gradient(90deg,#10b981,#6ee7b7)}
.comp-tile.warm .bar div{background:linear-gradient(90deg,#fbbf24,#fcd34d)}
.comp-tile.cool .bar div{background:linear-gradient(90deg,#fb7185,#fda4af)}

/* ============= SETTINGS ============= */
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.set-block{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:16px}
.set-block h3{font-size:0.94rem;font-weight:800;margin-bottom:9px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.set-block h3 button{background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.25);color:#c4b5fd;padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer}
.key-row{padding:9px 0;border-bottom:1px solid #1f1429;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
.key-row .info{display:flex;flex-direction:column;gap:3px}
.key-row .key-prefix{font-family:'SF Mono',monospace;font-size:0.7rem;color:#a78bfa}
.key-row .meta{font-size:0.66rem;color:#52527a}
.key-row .rev{background:transparent;border:1px solid rgba(251,113,133,.4);color:#fda4af;padding:3px 8px;border-radius:6px;font-size:0.7rem;cursor:pointer}

.billing-bar{height:80px;display:flex;gap:3px;align-items:flex-end;margin:12px 0 7px}
.billing-bar .b{flex:1;background:linear-gradient(180deg,#a78bfa,rgba(167,139,250,.18));border-radius:3px 3px 0 0;min-height:4px}
.billing-meta{display:flex;justify-content:space-between;font-size:0.72rem;color:#94a3b8;padding-top:7px;border-top:1px dashed #29213a}
.billing-meta b{color:#fff}

.alert-row{padding:9px 0;border-bottom:1px solid #1f1429;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
.alert-row .info b{color:#fff;font-weight:700;display:block;font-size:0.8rem}
.alert-row .info span{font-size:0.68rem;color:#94a3b8}

/* ============= Toast ============= */
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;padding:11px 18px;border-radius:10px;box-shadow:0 18px 50px rgba(167,139,250,.45);font-size:0.84rem;font-weight:700;z-index:500;animation:toastIn .25s}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* responsive */
@media(max-width:1100px){
  .ask-shell{grid-template-columns:1fr}
  .voc-shell{grid-template-columns:1fr}
  .voc-cards{grid-template-columns:1fr}
  .set-grid{grid-template-columns:1fr}
  .demo-bar .switcher{display:flex;margin-left:0;margin-top:6px;justify-content:center}

/* ========== APP ========== */
const { createApp, ref, computed, onMounted } = Vue;

const App = {
  setup() {
    const wsCode = ref('vivo');
    const ws = computed(() => WORKSPACES[wsCode.value]);
    const tab = ref('ask');
    const toast = ref('');
    function showToast(m) { toast.value = m; setTimeout(()=> toast.value='', 2000); }

    /* Ask */
    const askInput = ref('');
    const askRunning = ref(false);
    const askCurrent = ref(null);
    const streamedRows = ref([]);
    const streamedCols = ref([]);
    const streamedPlan = ref([]);
    const streamMeta = ref(null);

    function runStarter(key) {
      const data = ASK_RESULTS[key];
      if (!data) { showToast('该 prompt 暂无数据'); return; }
      askCurrent.value = key;
      askRunning.value = true;
      streamedRows.value = [];
      streamedCols.value = [];
      streamedPlan.value = [];
      streamMeta.value = null;
      data.plan.forEach((p, i) => setTimeout(()=> streamedPlan.value.push(p), 400 + i*350));
      setTimeout(()=> { streamedCols.value = data.cols.slice(); }, 800);
      data.rows.forEach((r, i) => {
        setTimeout(()=> {
          streamedRows.value.push({ data: r, just: true });
          setTimeout(()=> { const row = streamedRows.value[streamedRows.value.length-1]; if (row) row.just = false; }, 700);
        }, 1200 + i*500);
      });
      setTimeout(()=> { streamMeta.value = data.meta; askRunning.value = false; }, 1200 + data.rows.length*500 + 200);
    }

    /* Catalog state */
    const catSite = ref('');
    const catSearch = ref('');
    const drawerRow = ref(null);
    const catRows = computed(() => {
      // Use first 6 voc_skus as catalog rows
      return ws.value.voc_skus.map((s, i) => ({
        ...s,
        sale: 199 + i*40,
        original: 249 + i*40,
        rating: 4.3 + (i*0.1) % 0.5,
        sold30: 60 + i*40,
        age: 4 + i*2,
        conf: 0.85 + (i*0.02) % 0.15,
      }));
    });

    /* VOC */
    const vocSku = ref(WORKSPACES.vivo.voc_skus[0].sku);
    const vocData = computed(() => {
      const sku = ws.value.voc_skus.find(s => s.sku === vocSku.value);
      const insight = VOC_INSIGHTS[vocSku.value];
      return { sku, insight };
    });

    // 切 workspace 时重置 VOC sku 到该 workspace 第一个
    function switchWorkspace(code) {
      wsCode.value = code;
      vocSku.value = WORKSPACES[code].voc_skus[0].sku;
      // 重置 Ask 状态
      askCurrent.value = null;
      streamedRows.value = [];
      streamedCols.value = [];
      streamedPlan.value = [];
      streamMeta.value = null;
      // 启动默认 demo
      setTimeout(()=> runStarter(WORKSPACES[code].starters[0].key), 200);
    }

    function pillClass(r) {
      if (r.conf >= 0.85 && r.age < 24) return 'ok';
      if (r.age >= 24*7) return 'warn';
      return 'ok';
    }
    function pillText(r) {
      if (r.age >= 24*7) return '⚠ Stale';
      return '✓ Verified';
    }

    onMounted(()=> {
      setTimeout(()=> runStarter(ws.value.starters[0].key), 400);
    });

    return {
      WORKSPACES, wsCode, ws, switchWorkspace,
      tab, toast, showToast,
      askInput, askRunning, askCurrent, streamedRows, streamedCols, streamedPlan, streamMeta,
      runStarter,
      catSite, catSearch, drawerRow, catRows, pillClass, pillText,
      vocSku, vocData
    };
  },
  template: `

        <button :class="{active:wsCode==='aosen'}" @click="switchWorkspace('aosen')">遨森</button>
        <button :class="{active:wsCode==='haier'}" @click="switchWorkspace('haier')">海尔</button>

          <div v-if="!askCurrent" class="starters">

          <div v-if="askCurrent" class="result-card">

                <span v-else style="color:#fcd34d">⏳ 正在 stream…</span>
              </div>

                <button @click="showToast('已保存为 View')">Save</button>

                <button @click="showToast('链接已复制')">Share</button>
              </div>
            </div>
            <table class="result-table">

              <td>{{ r.rating.toFixed(1) }} ★</td>
              <td>{{ r.sold30 }}</td>
              <td><span class="pill" :class="pillClass(r)">{{ pillText(r) }}</span></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div v-if="drawerRow" class="overlay" @click.self="drawerRow=null">
        <div class="drawer">
          <div class="drawer-head">
            <h3>{{ drawerRow.name }} · 证据</h3>
            <button class="close" @click="drawerRow=null">关闭 ✕</button>
          </div>
          <div class="drawer-body">
            <div class="evidence-block">
              <h5>截图快照</h5>
              <div class="screenshot">📸 mock screenshot · {{ drawerRow.age }}h ago</div>
              <div class="meta-row"><span class="k">源 URL</span><a>{{ drawerRow.site }}.com/{{ drawerRow.sku }}</a></div>
              <div class="meta-row"><span class="k">抓取时间</span><span>{{ drawerRow.age }}h ago</span></div>
              <div class="meta-row"><span class="k">CSS Selector</span><code>span.product-price__current</code></div>
              <div class="meta-row"><span class="k">置信度</span>{{ (drawerRow.conf*100).toFixed(0) }}%</div>
            </div>
            <div class="evidence-block">
              <h5>价格历史</h5>
              <div class="meta-row"><span class="k">现价</span><b>$\{{ drawerRow.sale.toFixed(2) }}</b></div>
              <div class="meta-row"><span class="k">原价</span><span>$\{{ drawerRow.original.toFixed(2) }}</span></div>
              <div class="meta-row"><span class="k">趋势</span><span style="color:#6ee7b7">↓ 降价 {{ ((1-drawerRow.sale/drawerRow.original)*100).toFixed(1) }}%</span></div>
            </div>
            <button class="btn-go" style="width:100%" @click="showToast('加入 watchlist');drawerRow=null">⭐ Watchlist</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ============= VOC ============= -->
    <div v-if="tab==='voc'" class="page">
      <div class="lead">VOC · 自动洞察 <span class="ws-tag">{{ ws.name }}</span></div>
      <div class="sub">差评 Top 3 + 关键词云 + 竞品对比 + 行动建议</div>

      <div class="voc-shell">
        <div class="voc-sidebar">
          <h4>SKU 列表（{{ ws.voc_skus.length }}）</h4>
          <div v-for="s in ws.voc_skus" :key="s.sku" class="sku-pick" :class="{active: vocSku===s.sku}" @click="vocSku=s.sku">
            <span>{{ s.name }}</span>
            <span class="site-name">{{ s.site.split('_')[0] }}</span>
          </div>
        </div>

        <div class="voc-detail" v-if="vocData.insight">
          <div class="voc-head">
            <div class="name">{{ vocData.sku.name }}</div>
            <div class="meta">
              <span>SKU <b>{{ vocData.sku.sku }}</b></span>
              <span>站点 <b>{{ vocData.sku.site }}</b></span>
              <span>样本 <b>{{ vocData.insight.sample }}</b></span>
              <span>生成于 <b>{{ vocData.insight.generated }}</b></span>
            </div>
          </div>

          <div class="voc-cards">
            <div class="voc-block">
              <h5>差评 Top 3 <span class="actions"><button @click="showToast('已复制 MD')">copy</button><button @click="showToast('发到 Slack')">slack</button></span></h5>
              <div class="complaint" v-for="c in vocData.insight.complaints" :key="c.theme">
                <div class="theme">{{ c.theme }}<span class="share">{{ (c.share*100).toFixed(0) }}%</span></div>
                <div class="quote">"{{ c.sample }}"</div>
                <div class="bar"><div :style="{width:(c.share*100)+'%'}"></div></div>
              </div>
            </div>

            <div class="voc-block">
              <h5>关键词云 <span class="actions"><button @click="showToast('已导出')">export</button></span></h5>
              <div class="kw-cloud">
                <span class="kw" :class="kw.k" v-for="kw in vocData.insight.cloud" :key="kw.term" :style="{fontSize:(0.7+kw.w/40)+'rem'}">{{ kw.term }}</span>
              </div>
            </div>

            <div class="voc-block">
              <h5>竞品对比 <span class="actions"><button @click="showToast('查看详情')">详情</button></span></h5>
              <div class="compare-row" v-for="c in vocData.insight.compare" :key="c.site">
                <div class="site">{{ c.site }}</div>
                <div class="info">$\{{ c.price.toLocaleString() }} · {{ c.rating }} ★<span>({{ c.reviews }} 评论)</span><br/><span>主诉：{{ c.complaint }}</span></div>
                <div class="delta" :class="c.deltaCls">$\{{ c.delta }}</div>
              </div>
            </div>

            <div class="voc-block">
              <h5>行动建议 <span class="actions"><button @click="showToast('已复制')">copy</button><button @click="showToast('PDF 生成中')">pdf</button></span></h5>
              <ul class="recs">
                <li v-for="(r, i) in vocData.insight.recs" :key="i" v-html="r"></li>
              </ul>
            </div>
          </div>

          <div class="voc-foot">
            <span class="cost">下次刷新成本 <b>$0.02</b> · 每 24h 自动重算</span>
            <button @click="showToast('告警已设：差评 >30%')">⚡ Alert</button>
            <button @click="showToast('Insight 刷新中…')">🔄 Refresh ($0.02)</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ============= RADAR (替代 Coverage)，工作区下的竞品雷达 ============= -->
    <div v-if="tab==='radar'" class="page">
      <div class="lead">竞品 Radar <span class="ws-tag">{{ ws.name }}</span></div>
      <div class="sub">{{ ws.stats.sites }} · 共 {{ ws.competitors.length }} 个数据源 · 跟踪 SKU {{ ws.stats.tracked_sku.toLocaleString() }}</div>

      <div class="competitor-grid">
        <div class="comp-tile" :class="c.klass" v-for="c in ws.competitors" :key="c.code">
          <h6>{{ c.name }}</h6>
          <div class="ctry">{{ c.country }}</div>
          <div class="num">{{ c.count.toLocaleString() }}</div>
          <div class="pct">SKU</div>
          <div class="bar"><div :style="{width: Math.min(100, c.count/2500)+'%'}"></div></div>
        </div>
      </div>

      <div style="margin-top:18px;background:#13111f;border:1px solid #29213a;border-radius:11px;padding:16px;font-size:0.84rem;color:#cbd5e1">
        <h3 style="font-size:0.95rem;color:#fcd34d;margin-bottom:9px">💡 工作区数据增长趋势</h3>
        <p>本月 {{ ws.name }} 跟踪 SKU 增长 <b style="color:#6ee7b7">+12%</b> · 新增 {{ Math.floor(ws.stats.tracked_sku*0.12) }} 条</p>
        <p style="color:#94a3b8;margin-top:5px">想加新数据源？联系客户成功团队或在 <a @click="tab='settings'" style="cursor:pointer">Settings</a> 申请。</p>
      </div>
    </div>

    <!-- ============= SETTINGS ============= -->
    <div v-if="tab==='settings'" class="page">
      <div class="lead">设置 <span class="ws-tag">{{ ws.name }}</span></div>
      <div class="sub">API Keys · Billing · Alerts · Team</div>

      <div class="set-grid">
        <div class="set-block">
          <h3>🔑 API Keys <button @click="showToast('新 Key 已创建')">+ 新建</button></h3>
          <div class="key-row">
            <div class="info">
              <b>Production · {{ ws.name }}</b>
              <span class="key-prefix">sck_UYC...n9dHJ</span>
              <span class="meta">{{ ws.usage.current.toLocaleString() }} 次调用</span>
            </div>
            <button class="rev" @click="showToast('Key 已撤销')">撤销</button>
          </div>
          <div class="key-row">
            <div class="info">
              <b>Staging</b>
              <span class="key-prefix">sck_xY8...4kPv2</span>
              <span class="meta">{{ Math.floor(ws.usage.current*0.15).toLocaleString() }} 次调用</span>
            </div>
            <button class="rev" @click="showToast('Key 已撤销')">撤销</button>
          </div>
        </div>

        <div class="set-block">
          <h3>💰 Billing <button @click="showToast('账单下载')">下载发票</button></h3>
          <div style="font-size:1.5rem;font-weight:900;color:#c4b5fd">$\{{ ws.usage.mtd }} <span style="font-size:0.78rem;color:#94a3b8">MTD</span></div>
          <div style="font-size:0.76rem;color:#52527a">{{ ws.usage.current.toLocaleString() }} records · $1.5/1k · {{ ws.plan }}</div>
          <div class="billing-bar">
            <div class="b" v-for="i in 30" :key="i" :style="{height: (10+Math.sin(i*0.4)*40+i*1.2)+'%'}"></div>
          </div>
          <div class="billing-meta">
            <span>过去 30 天</span>
            <span>预估月底 <b>$\{{ (ws.usage.mtd * 1.5).toFixed(2) }}</b></span>
          </div>
        </div>

        <div class="set-block">
          <h3>🔔 Alerts <button @click="showToast('告警已新建')">+ 新建</button></h3>
          <div class="alert-row">
            <div class="info"><b>{{ ws.stats.alerts_active }} 个活跃告警</b><span>下次触发 ~ 30 min</span></div>
            <button class="rev" @click="showToast('管理告警')">管理</button>
          </div>
          <div class="alert-row">
            <div class="info"><b>差评 {{ ws.stats.voc_reviews_30d.toLocaleString() }} 条已扫描</b><span>30 天 · NLP 已处理</span></div>
            <button class="rev" @click="showToast('查看分析')">查看</button>
          </div>
        </div>

        <div class="set-block">
          <h3>👥 Team</h3>
          <p style="color:#94a3b8;font-size:0.82rem;margin-bottom:9px">{{ ws.plan }} · 当前 {{ ws.user }} 等 {{ ws.plan.match(/\\d+/)?.[0] || 1 }} 用户</p>
          <button class="btn-go" @click="showToast('邀请链接已复制')">📩 邀请成员</button>
          <p style="color:#52527a;font-size:0.7rem;margin-top:8px">需要更多席位？联系 sales@smartcrawler.io</p>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div v-if="toast" class="toast">{{ toast }}</div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>

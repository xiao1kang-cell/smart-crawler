<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>smart-crawler · 站点报表</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"PingFang SC","Segoe UI",sans-serif}
body{background:#f5f6f8;color:#1f2329;font-size:13.5px;line-height:1.55}
a{color:#7c6ce0;text-decoration:none}

.wrap{max-width:1180px;margin:0 auto;padding:18px}

/* breadcrumb */
.crumb{font-size:13px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.crumb a{color:#7c6ce0}
.crumb .last-update{color:#9ca3af;font-size:12px}

/* site banner */
.site-card{background:linear-gradient(135deg,#eef0ff,#f7f8ff);border:1px solid #e5e7ff;border-radius:12px;padding:18px 22px;margin-bottom:18px}
.site-card .top{display:flex;justify-content:space-between;align-items:flex-start}
.site-card h2{font-size:18px;font-weight:800;color:#1f2329;margin-bottom:4px}
.site-card .url{color:#7c6ce0;font-size:13px;text-decoration:underline}
.site-card .meta{display:flex;gap:24px;margin-top:14px;font-size:12.5px;color:#6b7280}
.site-card .meta b{color:#1f2329}
.date-picker{display:flex;gap:8px;align-items:center}
.date-picker select{padding:6px 12px;border:1px solid #d1d5db;border-radius:7px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit}
.icon-btn{padding:6px 9px;border:1px solid #d1d5db;border-radius:7px;background:#fff;cursor:pointer;font-size:13px;color:#6b7280}
.icon-btn:hover{background:#f3f4f6}

/* tab nav */
.tab-row{display:flex;gap:0;border-bottom:1px solid #e5e7eb;margin-bottom:18px}
.tab-row button{background:none;border:none;padding:10px 18px;font-size:14px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;display:flex;align-items:center;gap:6px}
.tab-row button:hover{color:#1f2329}
.tab-row button.active{color:#7c6ce0;border-bottom-color:#7c6ce0}

/* stats grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e5e7eb;border-radius:11px;padding:14px 16px}
.stat .lbl{font-size:11.5px;color:#6b7280;margin-bottom:4px}
.stat .val{font-size:22px;font-weight:800;color:#1f2329;letter-spacing:0;line-height:1.15;white-space:nowrap;font-variant-numeric:tabular-nums}
.stat .sub{font-size:11px;color:#9ca3af;margin-top:3px}

/* section card */
.section{background:#fff;border:1px solid #e5e7eb;border-radius:11px;padding:18px 20px;margin-bottom:18px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-head h3{font-size:15.5px;font-weight:800;color:#1f2329;display:flex;align-items:center;gap:8px}
.section-head h3 .desc{font-size:12px;font-weight:400;color:#9ca3af;margin-left:6px}
.section-head .actions{display:flex;gap:8px;align-items:center}

/* chart */
.chart-wrap{position:relative}
.legend{display:flex;justify-content:center;gap:18px;margin-bottom:12px;font-size:12px;color:#6b7280}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.chart-svg{width:100%;height:260px;background:#fafbfc;border-radius:8px}
.chart-svg .grid{stroke:#e5e7eb;stroke-dasharray:3,3}
.chart-svg .axis-label{font-size:10px;fill:#9ca3af}

/* sub tabs (product analysis) */
.sub-tabs{display:flex;gap:8px;margin-bottom:14px}
.sub-tabs button{padding:6px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:12.5px;font-weight:600;color:#6b7280;font-family:inherit}
.sub-tabs button.active{background:#eef0ff;border-color:#7c6ce0;color:#7c6ce0}
.sub-tabs .right{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.search-box{padding:6px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:12.5px;font-family:inherit;width:200px;outline:none}
.search-box:focus{border-color:#7c6ce0}
.price-box{width:110px}

/* product table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:11px 12px;background:#fafbfc;color:#6b7280;font-size:11.5px;letter-spacing:.5px;font-weight:600;border-bottom:1px solid #e5e7eb}
td{padding:12px;border-bottom:1px solid #f0f1f3;color:#1f2329;vertical-align:middle}
tr:hover td{background:#fafbfc}
.thumb{width:48px;height:48px;border-radius:6px;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sku-link{color:#7c6ce0;text-decoration:underline;font-weight:600;font-size:12.5px}
.add-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:#eef0ff;color:#7c6ce0;border:none;cursor:pointer;font-size:14px;margin-right:6px}
.title-cell{display:flex;align-items:center;gap:12px}
.title-cell .info{flex:1;font-size:12.5px;line-height:1.45}
.attr-cell{font-size:12px;color:#6b7280;line-height:1.5}
.new-badge{display:inline-block;padding:1px 6px;border-radius:9px;background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;margin-left:4px}
.op-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;color:#7c6ce0;font-size:14px}

/* pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:14px;font-size:12.5px}
.pagination button{min-width:30px;height:30px;padding:0 8px;border:1px solid #d1d5db;background:#fff;color:#1f2329;cursor:pointer;border-radius:6px;font-family:inherit;font-size:12.5px}
.pagination button:hover:not(:disabled){background:#f3f4f6}
.pagination button.active{background:#7c6ce0;color:#fff;border-color:#7c6ce0}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination select{padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12.5px;font-family:inherit;margin-left:8px}

.loading{text-align:center;padding:32px;color:#9ca3af;font-size:13px}
.empty{text-align:center;padding:32px;color:#9ca3af}

@media(max-width:900px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .sub-tabs{flex-wrap:wrap}
  .sub-tabs .right{width:100%;margin-left:0;justify-content:flex-start}
}

/* 自定义抽屉 */
.cfg-mask{position:fixed;inset:0;background:rgba(31,35,41,.45);z-index:99;display:none}
.cfg-mask.open{display:block}
.cfg-drawer{position:fixed;top:0;right:0;width:380px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:100;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
.cfg-drawer.open{transform:translateX(0)}
.cfg-head{padding:18px 22px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.cfg-head h3{font-size:15.5px;font-weight:800;color:#1f2329}
.cfg-head .close{background:none;border:none;font-size:20px;color:#6b7280;cursor:pointer;line-height:1}
.cfg-body{flex:1;overflow-y:auto;padding:18px 22px}
.cfg-group{margin-bottom:22px}
.cfg-group h4{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.cfg-row{display:flex;align-items:center;padding:7px 0;font-size:13px;color:#1f2329}
.cfg-row input[type=checkbox]{margin-right:9px;width:14px;height:14px;cursor:pointer;accent-color:#7c6ce0}
.cfg-row label{cursor:pointer;flex:1}
.cfg-foot{padding:14px 22px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end}
.cfg-foot button{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #d1d5db;background:#fff;color:#6b7280;font-family:inherit}
.cfg-foot button.primary{background:#7c6ce0;color:#fff;border-color:#7c6ce0}
.cfg-row select{margin-left:10px;padding:4px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12.5px;font-family:inherit}

/* ============ DARK THEME（html[data-theme="dark"]，共用 localStorage.sc_theme） ============ */
html[data-theme="dark"] body{background:#0a0612;color:#e5e7eb}
html[data-theme="dark"] a{color:#a78bfa}
html[data-theme="dark"] .crumb{color:#94a3b8}
html[data-theme="dark"] .crumb a{color:#a78bfa}
html[data-theme="dark"] .crumb .last-update{color:#52527a}

html[data-theme="dark"] .icon-btn{color:#94a3b8}

html[data-theme="dark"] th{background:#0d0a17;color:#52527a;border-bottom-color:#29213a}

html[data-theme="dark"] tr:hover td{background:rgba(167,139,250,.05)}

html[data-theme="dark"] .sku-link{color:#a78bfa}
html[data-theme="dark"] .add-btn{background:rgba(167,139,250,.14);color:#c4b5fd}
html[data-theme="dark"] .attr-cell{color:#94a3b8}
html[data-theme="dark"] .new-badge{background:rgba(247,183,49,.14);color:#fcd34d}
html[data-theme="dark"] .op-btn{border-color:#29213a;background:#13111f;color:#c4b5fd}
html[data-theme="dark"] .pagination button{border-color:#29213a;background:#13111f;color:#e5e7eb}

html[data-theme="dark"] .cfg-row select{background:#0d0a17;border-color:#29213a;color:#e5e7eb}

/* 主题切换按钮（左下角） */
#theme-toggle{position:fixed;left:18px;bottom:18px;z-index:9000;display:flex;align-items:center;gap:8px;
  background:#fff;border:1px solid #e5e7eb;color:#1f2329;padding:9px 14px;border-radius:999px;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(37,29,61,.18);transition:all .18s}
#theme-toggle:hover{transform:translateY(-1px)}
html[data-theme="dark"] #theme-toggle{background:#13111f;border-color:#29213a;color:#e5e7eb;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#theme-toggle .ico{font-size:15px;line-height:1}
</style>

<body>
<script>
/* 主题初始化（与控制台共用 localStorage.sc_theme），首屏前应用防闪烁 */
(function(){
  try{ if((localStorage.getItem('sc_theme')||'dark')==='dark') document.documentElement.setAttribute('data-theme','dark'); }catch(e){}
})();
</script>
<div id="app"></div>

<!-- 主题切换按钮（左下角） -->
<button id="theme-toggle" type="button" aria-label="切换主题">
  <span class="ico">🌙</span><span class="txt">暗色</span>
</button>
<script>
(function(){
  var btn=document.getElementById('theme-toggle'),root=document.documentElement;
  function render(){var d=root.getAttribute('data-theme')==='dark';
    btn.querySelector('.ico').textContent=d?'☀️':'🌙';btn.querySelector('.txt').textContent=d?'浅色':'暗色';}
  btn.addEventListener('click',function(){
    var d=root.getAttribute('data-theme')==='dark';
    if(d){root.removeAttribute('data-theme');try{localStorage.setItem('sc_theme','light')}catch(e){}}
    else {root.setAttribute('data-theme','dark');try{localStorage.setItem('sc_theme','dark')}catch(e){}}
    render();});
  render();
})();
</script>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue;

const SITE_BRAND = {
  songmics_us:'SONGMICS', songmics_de:'SONGMICS', songmics_uk:'SONGMICS', songmics_it:'SONGMICS', songmics_fr:'SONGMICS', songmics_es:'SONGMICS',
  costway_us:'Costway', costway_ca:'Costway', costway_uk:'Costway',
  homary_us:'Homary', vidaxl_de:'Vidaxl', wayfair_us:'Wayfair',
  westelm_us:'WestElm', cratebarrel_us:'Crate&Barrel', overstock_us:'Overstock',
  idealo_de:'Idealo', bol_nl:'Bol', cdiscount_fr:'CDiscount', ikea_us:'IKEA',
  article_us:'Article', allegro_pl:'Allegro', ebay_us:'eBay', otto_de:'Otto',
};

const App = {
  setup() {
    /* Auth */
    const token = ref(localStorage.getItem('sc_token') || '');
    const url = new URL(window.location.href);
    const currentWorkspaceId = ref(url.searchParams.get('workspace_id') ||
                                   localStorage.getItem('sc_workspace_id') || '');
    function authH() {
      const h = { 'Authorization': 'Bearer ' + token.value };
      if (currentWorkspaceId.value) h['X-Workspace-ID'] = currentWorkspaceId.value;
      return h;
    }
    if (!token.value) {
      // 简易跳登录
      window.location.href = '/app';
    }

    /* Site picker */
    const initialSite = url.searchParams.get('site') || 'songmics_us';
    const site = ref(initialSite);
    const sites = ref([]);

    const tab = ref('shop'); // shop / product / promo
    const subTab = ref('all'); // all / bestseller / new
    const search = ref('');
    const minPrice = ref('');
    const maxPrice = ref('');
    const page = ref(1);
    const pageSize = ref(10);

    const cards = ref({});
    const trends = ref([]);
    const products = ref({ items:[], total:0 });
    const promos = ref({ items:[], total:0 });
    const loading = ref(false);

    const dateRange = ref({ from:'2025-10-01', to:'2026-04-16' });
    const lastUpdate = ref('2026.05.15');

    /* 用户自定义配置 */
    const DEFAULT_CFG = {
      sections: { kpi:true, trend:true, products:true, promos:true },
      kpiCards: { sku:true, new:true, sales:true, revenue:true, traffic:true, conversion:true },
      productCols: { sku:true, title:true, attrs:true, price:false, rating:false, status:false },
      timeRange: '30d',  // 7d / 30d / 90d / all
    };
    function loadCfg() {
      try {
        const raw = localStorage.getItem('sc_report_cfg');
        if (!raw) return JSON.parse(JSON.stringify(DEFAULT_CFG));
        const saved = JSON.parse(raw);
        return {
          sections: { ...DEFAULT_CFG.sections, ...(saved.sections||{}) },
          kpiCards: { ...DEFAULT_CFG.kpiCards, ...(saved.kpiCards||{}) },
          productCols: { ...DEFAULT_CFG.productCols, ...(saved.productCols||{}) },
          timeRange: saved.timeRange || '30d',
        };
      } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_CFG)); }
    }
    const cfg = ref(loadCfg());
    const cfgOpen = ref(false);
    function saveCfg() {
      localStorage.setItem('sc_report_cfg', JSON.stringify(cfg.value));
      cfgOpen.value = false;
    }
    function resetCfg() {
      cfg.value = JSON.parse(JSON.stringify(DEFAULT_CFG));
      localStorage.removeItem('sc_report_cfg');
    }

    /* Loads */
    async function loadSites() {
      try {
        const r = await fetch('/api/sites', { headers: authH() });
        sites.value = await r.json();
      } catch(e) {}
    }

    async function loadOverview() {
      loading.value = true;
      try {
        const r = await fetch(`/api/sites/${site.value}/overview`, { headers: authH() });
        const d = await r.json();
        cards.value = d.cards || {};
        trends.value = d.trends || [];
      } catch(e) { cards.value = {}; trends.value = []; }
      finally { loading.value = false; }
    }

    async function loadProducts() {
      try {
        const params = new URLSearchParams({
          site: site.value, page: page.value, page_size: pageSize.value,
        });
        if (search.value) params.set('search', search.value);
        if (minPrice.value !== '' && !Number.isNaN(Number(minPrice.value))) params.set('min_price', minPrice.value);
        if (maxPrice.value !== '' && !Number.isNaN(Number(maxPrice.value))) params.set('max_price', maxPrice.value);
        // 子 tab → 后端唯一认的 tab 参数(all|bestseller|new)
        if (subTab.value === 'new' || subTab.value === 'bestseller')
          params.set('tab', subTab.value);
        const r = await fetch(`/api/products?${params}`, { headers: authH() });
        const d = await r.json();
        products.value = { items: d.items || [], total: d.total || 0 };
      } catch(e) { products.value = { items:[], total:0 } }
    }

    async function loadPromotions() {
      try {
        const r = await fetch(`/api/promotions?site=${site.value}&page_size=20`, { headers: authH() });
        const d = await r.json();
        promos.value = { items: d.items || d || [], total: (d.total||0) };
      } catch(e) { promos.value = { items:[], total:0 } }
    }

    // 导出当前站点产品(复用公开导出端点,token 走 query)
    function exportProducts() {
      const params = new URLSearchParams({ token: token.value, site: site.value, format: 'xlsx' });
      if (currentWorkspaceId.value) params.set('workspace_id', currentWorkspaceId.value);
      if (search.value) params.set('search', search.value);
      if (minPrice.value !== '' && !Number.isNaN(Number(minPrice.value))) params.set('min_price', minPrice.value);
      if (maxPrice.value !== '' && !Number.isNaN(Number(maxPrice.value))) params.set('max_price', maxPrice.value);
      if (subTab.value === 'new' || subTab.value === 'bestseller') params.set('tab', subTab.value);
      params.set('scope', 'products');
      window.open(`/api/export/products?${params}`, '_blank');
    }

    async function loadAll() {
      await Promise.all([loadOverview(), loadProducts(), loadPromotions()]);
    }

    watch(site, () => { page.value = 1; loadAll(); });
    watch([subTab, search, minPrice, maxPrice, pageSize], () => { page.value = 1; loadProducts(); });
    watch(page, () => loadProducts());

    /* Helpers */
    const siteUrl = computed(() => {
      const s = sites.value.find(s => s.site === site.value);
      return s?.url || `https://www.${site.value.replace('_','.')}/`;
    });
    const brand = computed(() => SITE_BRAND[site.value] || (sites.value.find(s=>s.site===site.value)?.brand) || 'Brand');

    const totalPages = computed(() => Math.max(1, Math.ceil(products.value.total / pageSize.value)));

    /* Chart data prep */
    const chartLines = computed(() => {
      if (!trends.value.length) return null;
      // map series
      const source = trends.value.length > 1
        ? trends.value
        : [
            { ...(trends.value[0] || {}), date: dateRange.value.from },
            { ...(trends.value[0] || {}), date: dateRange.value.to },
          ];
      const dates = source.map(t => t.date);
      const series = {
        sku: source.map(t => t.sku_count || 0),
        new: source.map(t => t.new_product_count || 0),
        sales: source.map(t => t.estimated_sales || 0),
        revenue: source.map(t => Math.round(t.estimated_revenue || 0)),
      };
      const max = Math.max(
        Math.max(...series.sku, 1),
        Math.max(...series.new, 1),
        Math.max(...series.sales, 1),
        Math.max(...series.revenue, 1),
      );
      return { dates, series, max };
    });

    function makePath(values, max, w, h, pad=20) {
      if (!values.length) return '';
      const stepX = (w - 2*pad) / Math.max(values.length - 1, 1);
      return values.map((v, i) => {
        const x = pad + i * stepX;
        const y = h - pad - (v / max) * (h - 2*pad);
        return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
    }

    onMounted(() => {
      loadSites();
      loadAll();
    });

    return {
      token, site, sites, tab, subTab, search, minPrice, maxPrice, page, pageSize,
      cards, trends, products, promos, loading, dateRange, lastUpdate,
      siteUrl, brand, totalPages,
      loadAll, loadProducts, exportProducts,
      chartLines, makePath,
      cfg, cfgOpen, saveCfg, resetCfg,
    };

          <div v-if="cfg.kpiCards.new" class="stat"><div class="lbl">新增产品</div><div class="val">{{ cards.new_product_count ? cards.new_product_count.toLocaleString() : '--' }}</div><div class="sub">New Arrivals</div></div>
          <div v-if="cfg.kpiCards.sales" class="stat"><div class="lbl">30天销量</div><div class="val">{{ cards.thirty_day_sales ? cards.thirty_day_sales.toLocaleString() : '--' }}</div><div class="sub">上个周期: --</div></div>
          <div v-if="cfg.kpiCards.revenue" class="stat"><div class="lbl">30天收入</div><div class="val">{{ cards.thirty_day_revenue ? '$' + (cards.thirty_day_revenue/1000).toFixed(1) + 'k' : '--' }}</div><div class="sub">上个周期: --</div></div>

          <div v-if="cfg.kpiCards.conversion" class="stat"><div class="lbl">类别数</div><div class="val">{{ cards.category_count != null ? cards.category_count.toLocaleString() : '--' }}</div><div class="sub">Categories</div></div>
        </div>

        <div v-if="cfg.sections.trend" class="section">
          <div class="section-head">

            <div class="actions">
              <span style="font-size:12px;color:#6b7280">{{ dateRange.from }} → {{ dateRange.to }}</span>

          <div class="chart-wrap">

              <span><span class="legend-dot" style="background:#3b82f6"></span>库存单位</span>
              <span><span class="legend-dot" style="background:#10b981"></span>新SKU</span>
              <span><span class="legend-dot" style="background:#f59e0b"></span>销售</span>
              <span><span class="legend-dot" style="background:#ef4444"></span>收入</span>

            <svg v-if="chartLines" class="chart-svg" viewBox="0 0 900 260" preserveAspectRatio="none">
              <g class="grid">
                <line x1="40" y1="40" x2="880" y2="40"/>
                <line x1="40" y1="100" x2="880" y2="100"/>
                <line x1="40" y1="160" x2="880" y2="160"/>
                <line x1="40" y1="220" x2="880" y2="220"/>
              </g>
              <g class="axis-label">
                <text x="32" y="44" text-anchor="end">{{ chartLines.max }}</text>
                <text x="32" y="104" text-anchor="end">{{ Math.round(chartLines.max*0.66) }}</text>
                <text x="32" y="164" text-anchor="end">{{ Math.round(chartLines.max*0.33) }}</text>
                <text x="32" y="224" text-anchor="end">0</text>
              </g>
              <g>
                <path :d="makePath(chartLines.series.sku, chartLines.max, 900, 240)" stroke="#3b82f6" fill="none" stroke-width="2"/>
                <path :d="makePath(chartLines.series.new, chartLines.max, 900, 240)" stroke="#10b981" fill="none" stroke-width="2"/>
                <path :d="makePath(chartLines.series.sales, chartLines.max, 900, 240)" stroke="#f59e0b" fill="none" stroke-width="2"/>
                <path :d="makePath(chartLines.series.revenue, chartLines.max, 900, 240)" stroke="#ef4444" fill="none" stroke-width="2"/>
              </g>
              <g class="axis-label">
                <text v-for="(d, i) in chartLines.dates.filter((_, i) => i % Math.ceil(chartLines.dates.length/10) === 0)"
                      :key="i" :x="40 + i * (860/Math.max(chartLines.dates.length-1, 1)) * Math.ceil(chartLines.dates.length/10)"

                <th>库存单位</th>

      <!-- 自定义抽屉 -->
      <div class="cfg-mask" :class="{open: cfgOpen}" @click="cfgOpen=false"></div>
      <div class="cfg-drawer" :class="{open: cfgOpen}">

          <h3>⚙ 自定义报表</h3>
          <button class="close" @click="cfgOpen=false">✕</button>

          <div class="cfg-group">

          <button @click="resetCfg">恢复默认</button>
          <button class="primary" @click="saveCfg">保存配置</button>
        </div>
      </div>
    </div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>

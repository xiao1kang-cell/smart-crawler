<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>smart-crawler · 管理控制台</title>
<script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif}
html,body{background:#0a0612;color:#e5e7eb;font-size:14px;line-height:1.55;min-height:100vh}
#app{min-height:100vh;display:flex;flex-direction:column}
a{color:#a78bfa;text-decoration:none}
button{font-family:inherit}
input,select{font-family:inherit}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#13111f;border:1px solid #29213a;border-radius:18px;padding:38px 36px;width:380px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.login-brand{font-size:1.6rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.login-sub{font-size:0.84rem;color:#94a3b8;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:0.74rem;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.login-field input{width:100%;background:#0d0a17;border:1px solid #29213a;border-radius:8px;padding:11px 14px;color:#fff;font-size:0.92rem;outline:none}
.login-field input:focus{border-color:#a78bfa}
.login-btn{width:100%;background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;border:none;padding:11px;border-radius:8px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:#fda4af;font-size:0.78rem;margin-top:8px;min-height:18px}
.login-tabs{display:grid;grid-template-columns:1fr 1fr;background:#0d0a17;border:1px solid #29213a;border-radius:8px;padding:3px;margin-bottom:18px}
.login-tab{border:0;background:transparent;color:#94a3b8;border-radius:6px;padding:8px;font-weight:700;cursor:pointer}
.login-tab.active{background:#211735;color:#fff}
.login-note{font-size:0.72rem;color:#64647a;line-height:1.6;margin-top:10px}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,6,18,.94);backdrop-filter:blur(12px);border-bottom:1px solid #29213a;padding:11px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{font-weight:900;letter-spacing:-0.4px;font-size:1.05rem;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.site-picker{display:flex;align-items:center;gap:8px;padding:5px 11px 5px 7px;border-radius:8px;background:#13111f;border:1px solid #29213a;cursor:pointer;font-size:0.82rem}
.site-picker:hover{border-color:#a78bfa}
.site-picker .ws-icon{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#a78bfa,#f472b6);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;color:#fff}
.site-picker select{background:transparent;border:none;color:#fff;font-weight:700;outline:none;cursor:pointer;font-size:0.82rem;max-width:160px}

.tab-row{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.tab{padding:8px 13px;border-radius:8px;font-size:0.84rem;color:#94a3b8;cursor:pointer;font-weight:600;border:none;background:transparent;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab:hover{background:rgba(167,139,250,.08);color:#c4b5fd}
.tab.active{background:rgba(167,139,250,.16);color:#fff;box-shadow:inset 0 -2px 0 #a78bfa}

	.usage-strip{font-size:0.74rem;color:#94a3b8;padding:5px 11px;border-radius:8px;background:rgba(16,185,129,.10);border:1px solid rgba(16,185,129,.25)}
	.usage-strip b{color:#6ee7b7;font-weight:700}
	.icon-btn{padding:7px 9px;border-radius:8px;color:#94a3b8;cursor:pointer;border:1px solid #29213a;background:#13111f;font-size:0.84rem}
	.icon-btn:hover{background:rgba(167,139,250,.10);color:#c4b5fd}
	.acct{display:flex;align-items:center;gap:8px;padding:5px 11px 5px 5px;border-radius:8px;background:#13111f;border:1px solid #29213a;font-size:0.78rem;cursor:pointer}
	.acct:hover,.acct.active{border-color:rgba(167,139,250,.55);background:rgba(167,139,250,.10);color:#fff}
	.acct .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#f472b6);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:#fff}

.page{width:100%;max-width:1400px;margin:0 auto;padding:20px 22px 50px}
.lead{font-size:1.7rem;font-weight:900;letter-spacing:-0.6px;margin-bottom:5px}
.sub{font-size:0.86rem;color:#94a3b8;margin-bottom:16px}

.stats-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:11px;margin-bottom:18px}
.stat{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:13px 16px}
.stat .lbl{font-size:0.66rem;color:#52527a;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;font-weight:700}
.stat .val{font-size:1.55rem;font-weight:900;color:#fff;letter-spacing:-0.4px}
.stat .delta{font-size:0.72rem;color:#6ee7b7;margin-top:2px}
.stat .delta.warn{color:#fcd34d}
.stat .delta.bad{color:#fda4af}

.ask-shell{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:flex-start}
.ask-main{display:flex;flex-direction:column;gap:12px}
.ask-input{background:#13111f;border:2px solid #29213a;border-radius:12px;padding:12px 14px}
.ask-input:focus-within{border-color:#a78bfa}
.ask-input textarea{width:100%;background:transparent;border:none;outline:none;color:#fff;font-size:0.94rem;resize:none;min-height:38px;font-family:inherit}
.ask-input textarea::placeholder{color:#52527a}
.ask-input-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:0.7rem;color:#52527a}
.kbd{background:#0a0612;border:1px solid #29213a;border-radius:4px;padding:1px 5px;font-family:'SF Mono',monospace;font-size:0.66rem}
.btn-go{background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;border:none;padding:6px 16px;border-radius:7px;font-size:0.78rem;font-weight:700;cursor:pointer}

.starters{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.starter{background:#13111f;border:1px solid #29213a;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;min-height:104px;display:flex;flex-direction:column}
.starter:hover{border-color:#a78bfa;transform:translateY(-2px)}
.starter .icon{font-size:1.2rem;margin-bottom:5px}
.starter .title{font-size:0.84rem;font-weight:700;color:#fff;margin-bottom:3px;min-height:22px}
.starter .desc{font-size:0.72rem;color:#94a3b8;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.trace{background:#13111f;border:1px solid #29213a;border-radius:12px;padding:13px 14px;font-size:0.76rem}
.trace h4{font-size:0.66rem;color:#52527a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}

.pill{display:inline-flex;align-items:center;gap:3px;font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:9px}
.pill.ok{background:rgba(16,185,129,.14);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.pill.warn{background:rgba(247,183,49,.14);color:#fcd34d;border:1px solid rgba(247,183,49,.3)}
.pill.bad{background:rgba(251,113,133,.14);color:#fda4af;border:1px solid rgba(251,113,133,.3)}
.pill.pending{background:rgba(96,165,250,.14);color:#93c5fd;border:1px solid rgba(96,165,250,.3)}

.cat-filters{display:flex;gap:8px;flex-wrap:wrap;background:#13111f;border:1px solid #29213a;border-radius:11px;padding:11px 12px;margin-bottom:12px}
.cat-filters select,.cat-filters input{background:#0d0a17;border:1px solid #29213a;border-radius:6px;padding:6px 10px;color:#cbd5e1;font-size:0.8rem;outline:none}

.cat-table-wrap{background:#13111f;border:1px solid #29213a;border-radius:12px;overflow:hidden}
.cat-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.cat-table th{text-align:left;padding:8px 12px;background:#0d0a17;color:#52527a;font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;border-bottom:1px solid #1f1429}
.cat-table td{padding:9px 12px;border-bottom:1px solid #1f1429;color:#cbd5e1}
.cat-table tr:hover{background:rgba(167,139,250,.05)}
.thumb{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,#475569,#1f2937);display:flex;align-items:center;justify-content:center;font-size:0.84rem}

.cov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-top:6px}
.cov-tile{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:13px 14px;display:flex;flex-direction:column;min-height:174px}
.cov-tile.critical{border-color:rgba(251,113,133,.3)}
.cov-tile.warning{border-color:rgba(247,183,49,.3)}
.cov-tile.healthy{border-color:rgba(16,185,129,.3)}
.cov-tile h6{font-size:0.84rem;font-weight:800;color:#fff;margin-bottom:2px;min-height:22px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cov-tile .country{font-size:0.64rem;color:#52527a;letter-spacing:1px;line-height:1.45;margin-bottom:6px;height:36px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cov-tile .num{font-size:1.3rem;font-weight:900;color:#c4b5fd;margin-bottom:0;min-height:32px;display:flex;align-items:center}
.cov-tile .pct{font-size:0.72rem;color:#94a3b8;margin-bottom:7px;min-height:20px;display:flex;align-items:center}
.cov-tile .bar{height:4px;background:#29213a;border-radius:3px;overflow:hidden}
.cov-tile .bar div{height:100%;background:linear-gradient(90deg,#10b981,#6ee7b7);transition:width .3s}
.cov-tile.warning .bar div{background:linear-gradient(90deg,#fbbf24,#fcd34d)}
.cov-tile.critical .bar div{background:linear-gradient(90deg,#fb7185,#fda4af)}
.cov-tile button{margin-top:10px;width:100%;background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.25);color:#c4b5fd;padding:5px;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer}
.cov-tile button:hover{background:rgba(167,139,250,.20)}

.entry-row{margin-top:16px;cursor:pointer}
.entry-card{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(59,124,229,.06));border:1px solid rgba(167,139,250,.30);border-radius:14px;padding:14px 18px;transition:all .2s}
.entry-card:hover{border-color:rgba(167,139,250,.55);background:linear-gradient(135deg,rgba(167,139,250,.20),rgba(59,124,229,.10))}
.entry-icon{font-size:1.8rem;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:rgba(167,139,250,.16);border-radius:11px}
.entry-meta{flex:1}
.entry-title{font-size:0.95rem;font-weight:800;color:#fff;margin-bottom:3px}
.entry-sub{font-size:0.74rem;color:#94a3b8}
.entry-arrow{color:#c4b5fd;font-size:1.3rem;font-weight:700}

.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px}
.report-tile{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:14px;display:flex;flex-direction:column;min-height:214px}
.report-tile.empty{background:linear-gradient(180deg,#ffffff,#fcfaff)}
.report-tile.ready{border-color:rgba(167,139,250,.40);background:linear-gradient(180deg,#181024,#13111f)}
.report-tile.warning{border-color:rgba(251,191,36,.35)}
.report-tile.critical{border-color:rgba(248,113,113,.35)}
.report-tile .head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;min-height:24px}
.report-tile h6{font-size:0.86rem;font-weight:800;color:#fff;margin:0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.report-tile .badge{font-size:0.62rem;padding:2px 7px;border-radius:9px;font-weight:700}
.report-tile .badge.healthy{background:rgba(74,222,128,.16);color:#86efac;border:1px solid rgba(74,222,128,.35)}
.report-tile .badge.warning{background:rgba(251,191,36,.16);color:#fcd34d;border:1px solid rgba(251,191,36,.35)}
.report-tile .badge.critical{background:rgba(248,113,113,.16);color:#fca5a5;border:1px solid rgba(248,113,113,.35)}
.report-tile .badge.pending{background:#f7f2ff;color:#7c3aed;border:1px solid #e9d5ff}
.report-tile .country{font-size:0.64rem;color:#52527a;letter-spacing:1px;margin-bottom:7px;min-height:32px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.report-tile .nums{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.report-tile .nums .item{padding:6px 0}
.report-tile .nums .lbl{font-size:0.58rem;color:#52527a;letter-spacing:0.6px;margin-bottom:2px;text-transform:uppercase}
.report-tile .nums .v{font-size:0.92rem;font-weight:900;color:#fff}
.report-tile .nums .v.dim{color:#64647a;font-weight:700}
.report-tile .covbar{height:5px;background:#1d1730;border-radius:3px;overflow:hidden;margin-bottom:10px}
.report-tile .covbar > i{display:block;height:100%;background:linear-gradient(90deg,#a78bfa,#7c3aed)}
.report-tile .covbar.warning > i{background:linear-gradient(90deg,#fcd34d,#fbbf24)}
.report-tile .covbar.critical > i{background:linear-gradient(90deg,#fca5a5,#f87171)}
.report-tile .num{font-size:1.1rem;font-weight:900;color:#c4b5fd;margin-bottom:10px}
.report-tile .btns{margin-top:auto}
.report-tile .btns a,.report-tile .btns button{display:block;width:100%;text-align:center;padding:6px 8px;border-radius:6px;font-size:0.74rem;font-weight:600;cursor:pointer;text-decoration:none;box-sizing:border-box}
.report-tile .btn-prim{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:0}
.report-tile .btn-prim:hover{filter:brightness(1.1)}
.report-tile .btn-gen{background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.25);color:#c4b5fd}
.report-tile .btn-muted{background:#f7f2ff;border:1px solid #d8b4fe;color:#6d28d9}
.report-tile .btn-gen:hover:not(:disabled){background:rgba(167,139,250,.20)}
.report-tile .btn-gen:disabled{opacity:.5;cursor:wait}

/* 红人页 */
.inf-workbench{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(280px,.85fr);gap:14px;align-items:stretch;margin-bottom:14px}
.inf-panel{background:var(--ui-card);border:1px solid var(--ui-border);border-radius:10px;padding:14px;box-shadow:0 10px 28px rgba(37,29,61,.07)}
.inf-panel h3{font-size:0.95rem;color:var(--ui-heading);margin-bottom:10px}
.inf-form{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.inf-sel{padding:9px 14px;border:1px solid #29213a;background:#13111f;color:#fff;border-radius:8px;font-family:inherit;font-size:0.86rem;cursor:pointer}
.inf-inp{flex:1;max-width:340px;padding:9px 14px;border:1px solid #29213a;background:#13111f;color:#fff;border-radius:8px;font-size:0.86rem;font-family:inherit;outline:none}
.inf-inp:focus{border-color:rgba(167,139,250,.55)}
.btn-prim{padding:9px 18px;border:0;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.86rem;font-family:inherit}
.btn-prim:disabled{opacity:.6;cursor:wait}
.inf-quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inf-chip{border:1px solid var(--ui-border);background:var(--ui-card-soft);border-radius:8px;padding:8px 10px;cursor:pointer;text-align:left;color:var(--ui-text)}
.inf-chip:hover{border-color:var(--ui-purple-line);background:#fff}
.inf-chip b{display:block;font-size:0.84rem;color:var(--ui-heading);margin-bottom:2px}
.inf-chip span{font-size:0.7rem;color:var(--ui-muted)}
.inf-err{background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.4);color:#fda4af;padding:12px 16px;border-radius:9px;font-size:0.84rem}
.inf-card{background:#13111f;border:1px solid #29213a;border-radius:12px;padding:18px 22px;margin-top:10px}
.inf-placeholder{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.inf-placeholder-card{background:var(--ui-card);border:1px solid var(--ui-border);border-radius:10px;padding:14px;min-height:150px;box-shadow:0 10px 28px rgba(37,29,61,.05)}
.inf-placeholder-card h4{font-size:0.86rem;color:var(--ui-heading);margin-bottom:12px}
.inf-line{height:9px;border-radius:999px;background:#eee6f7;margin:9px 0}
.inf-line.short{width:58%}
.inf-line.mid{width:78%}
.inf-empty-note{font-size:0.78rem;color:var(--ui-muted);margin-top:10px}
.inf-hero{display:flex;gap:18px;margin-bottom:18px;align-items:flex-start}
.inf-avatar{width:88px;height:88px;border-radius:50%;border:2px solid rgba(167,139,250,.4);object-fit:cover;flex-shrink:0;background:#0d0a17}
.inf-meta{flex:1}
.inf-name{font-size:1.4rem;color:#fff;font-weight:900;margin-bottom:4px}
.inf-name .b{margin-left:8px;font-size:0.62rem;padding:3px 9px;border-radius:9px;font-weight:700;vertical-align:middle}
.inf-name .b.ok{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}
.inf-name .b.warn{background:rgba(247,183,49,.18);color:#fcd34d;border:1px solid rgba(247,183,49,.4)}
.inf-handle{font-size:0.78rem;color:#94a3b8;margin-bottom:8px}
.inf-handle a{color:#a78bfa}
.inf-bio{font-size:0.84rem;color:#cbd5e1;line-height:1.55;white-space:pre-wrap;max-width:680px}
.inf-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:18px}
.inf-stats .stat{background:#0d0a17;border:1px solid #29213a;border-radius:8px;padding:10px 12px}
.inf-stats .stat .lbl{font-size:0.62rem;color:#64647a;letter-spacing:1px;text-transform:uppercase}
.inf-stats .stat .val{font-size:1.2rem;color:#c4b5fd;font-weight:900;margin-top:4px}
.inf-stats .stat .val.small{font-size:0.78rem;color:#cbd5e1;font-weight:600}
.inf-contact{background:#0d0a17;border:1px solid #29213a;border-radius:9px;padding:12px 16px;margin-bottom:18px;font-size:0.82rem;line-height:1.9}
.inf-contact h4{font-size:0.86rem;color:#fff;margin-bottom:8px;font-weight:800}
.inf-contact b{color:#c4b5fd}
.inf-contact a{color:#a78bfa;word-break:break-all}
.inf-posts h4{font-size:0.86rem;color:#fff;margin-bottom:10px;font-weight:800}
.post-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.post{background:#0d0a17;border:1px solid #29213a;border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:border-color .2s}
.post:hover{border-color:rgba(167,139,250,.55)}
.post img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#1f1429}
.post-info{padding:8px 11px;display:flex;flex-direction:column;gap:6px;flex:1}
.post-info .cap{font-size:0.72rem;color:#cbd5e1;line-height:1.5;height:42px;overflow:hidden}
.post-info .metrics{font-size:0.68rem;color:#94a3b8;margin-top:auto;display:flex;gap:10px;min-height:18px}

.jobs-list{background:#13111f;border:1px solid #29213a;border-radius:12px;overflow:hidden;margin-top:12px}
.job-row{display:grid;grid-template-columns:50px 1fr 100px 80px 80px 120px;gap:10px;padding:9px 14px;border-bottom:1px solid #1f1429;font-size:0.8rem;color:#cbd5e1;align-items:center}
.job-row.head{background:#0d0a17;color:#52527a;font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.job-row:hover:not(.head){background:rgba(167,139,250,.05)}

.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.set-block{background:#13111f;border:1px solid #29213a;border-radius:11px;padding:16px}
.set-block h3{font-size:0.94rem;font-weight:800;margin-bottom:9px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.page:has(.subnav-layout){flex:1;min-height:0;display:flex;flex-direction:column}
.subnav-layout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:14px;align-items:stretch;flex:1;min-height:0}
.subnav{position:sticky;top:82px;align-self:stretch;background:#13111f;border:1px solid #29213a;border-radius:11px;padding:8px;display:flex;flex-direction:column;gap:4px}
.subnav-item{width:100%;border:0;background:transparent;color:#94a3b8;border-radius:8px;padding:10px 11px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:2px}
.subnav-item span{font-size:0.84rem;font-weight:800;color:inherit}
.subnav-item small{font-size:0.68rem;color:#52527a;line-height:1.35}
.subnav-item:hover{background:rgba(167,139,250,.10);color:#c4b5fd}
.subnav-item.active{background:rgba(167,139,250,.16);color:#fff}
.subnav-item.active small{color:#c4b5fd}
.subnav-content{min-width:0;display:flex}
.subnav-content .set-block{width:100%}
.key-row{padding:9px 0;border-bottom:1px solid #1f1429;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
.key-row .info{display:flex;flex-direction:column;gap:3px}
.key-prefix{font-family:'SF Mono',monospace;font-size:0.7rem;color:#a78bfa}
.meta{font-size:0.66rem;color:#52527a}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.form-grid.one{grid-template-columns:1fr}
.set-inp,.set-sel{width:100%;box-sizing:border-box;background:#0d0a17;border:1px solid #29213a;border-radius:7px;color:#fff;padding:8px 10px;font-size:0.78rem;outline:none}
.set-inp:focus,.set-sel:focus{border-color:rgba(167,139,250,.55)}
.mini-btn{background:rgba(167,139,250,.16);border:1px solid rgba(167,139,250,.34);color:#c4b5fd;border-radius:7px;padding:7px 10px;font-weight:700;cursor:pointer;font-size:0.74rem}
.mini-btn.bad{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.30);color:#fca5a5}
.secret-box{margin-top:8px;background:#0d0a17;border:1px solid rgba(167,139,250,.35);border-radius:8px;padding:9px 10px;font-family:'SF Mono',monospace;font-size:0.72rem;color:#c4b5fd;word-break:break-all}

.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;padding:11px 18px;border-radius:10px;box-shadow:0 18px 50px rgba(167,139,250,.45);font-size:0.84rem;font-weight:700;z-index:500;animation:toastIn .25s}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Light theme trial: clean SaaS surface with purple product accents. */
:root{
  --ui-bg:#f6f4fb;
  --ui-bg-2:#eee8f8;
  --ui-card:#ffffff;
  --ui-card-soft:#fbf9ff;
  --ui-border:#ece6f3;
  --ui-border-strong:#ddd1ee;
  --ui-text:#182033;
  --ui-heading:#0f172a;
  --ui-muted:#64748b;
  --ui-dim:#8b7e99;
  --ui-purple:#7c3aed;
  --ui-purple-strong:#6d28d9;
  --ui-purple-soft:#f2e8ff;
  --ui-purple-line:#c4b5fd;
  --ui-green:#059669;
  --ui-amber:#d97706;
  --ui-red:#dc2626;
}
html,body{background:linear-gradient(180deg,#efe7fb 0,#f8f5ff 210px,#fbfaff 520px);color:var(--ui-text);font-size:15px}
a{color:var(--ui-purple)}
.topbar{
  background:linear-gradient(90deg,rgba(255,255,255,.96),rgba(250,245,255,.96));
  border-bottom-color:var(--ui-border);
  box-shadow:0 12px 30px rgba(37,29,61,.10);
}
.topbar:before{content:none}
.site-picker,.icon-btn,.acct,.login-tabs{
  background:var(--ui-card-soft);
  border-color:var(--ui-border);
  color:var(--ui-text);
}
.site-picker:hover,.icon-btn:hover,.acct:hover,.acct.active{border-color:var(--ui-purple-line);background:#fff;color:var(--ui-heading)}
.site-picker select{color:var(--ui-text)}
.tab{color:#5f5870}
.tab:hover{background:var(--ui-purple-soft);color:var(--ui-purple)}
.tab.active{background:#ede4ff;color:var(--ui-purple-strong);box-shadow:inset 0 -2px 0 var(--ui-purple)}
.usage-strip{background:#ecfdf5;border-color:#a7f3d0;color:#047857}
.usage-strip b{color:#047857}
.page{padding-top:24px}
.lead{color:var(--ui-heading);letter-spacing:-0.1px;display:flex;align-items:center;gap:9px;font-size:1.42rem}
.lead:before{content:"";width:4px;height:19px;border-radius:4px;background:#a78bfa}
.sub{color:var(--ui-muted)}
.login-wrap{background:linear-gradient(180deg,#fbfaff,#efe7fb)}
.login-card,.stat,.ask-input,.starter,.trace,.cat-filters,.cat-table-wrap,.cov-tile,.report-tile,.inf-card,.jobs-list,.set-block,.inf-contact,.post,.overview-section{
  background:var(--ui-card);
  border-color:var(--ui-border);
  box-shadow:0 14px 34px rgba(37,29,61,.11);
}
.subnav{
  background:rgba(255,255,255,.72);
  border-color:var(--ui-border);
  box-shadow:0 10px 26px rgba(37,29,61,.06);
}
.subnav-item{color:var(--ui-muted)}
.subnav-item small{color:var(--ui-dim)}
.subnav-item:hover{background:var(--ui-purple-soft);color:var(--ui-purple)}
.subnav-item.active{background:#ede4ff;color:var(--ui-purple-strong);box-shadow:inset 3px 0 0 var(--ui-purple)}
.subnav-item.active small{color:#6d5c82}
.login-field input,.cat-filters select,.cat-filters input,.inf-sel,.inf-inp,.set-inp,.set-sel,.kbd,.inf-stats .stat,.secret-box{
  background:var(--ui-card-soft);
  border-color:var(--ui-border);
  color:var(--ui-text);
}
.ask-input textarea{color:var(--ui-text)}
.ask-input textarea::placeholder{color:#9a8fac}
.login-sub,.login-field label,.login-tab,.login-note,.stat .lbl,.ask-input-row,.starter .desc,.trace h4,.cat-table th,.cov-tile .country,.cov-tile .pct,.report-tile .country,.report-tile .nums .lbl,.entry-sub,.inf-handle,.inf-stats .stat .lbl,.post-info .metrics,.job-row.head,.meta{
  color:var(--ui-muted);
}
.login-tab.active{background:var(--ui-purple-soft);color:var(--ui-purple)}
.login-field input:focus,.ask-input:focus-within,.cat-filters select:focus,.cat-filters input:focus,.inf-inp:focus,.set-inp:focus,.set-sel:focus{
  border-color:var(--ui-purple-line);
  box-shadow:0 0 0 3px rgba(124,58,237,.10);
}
.stat .val,.starter .title,.entry-title,.cov-tile h6,.report-tile h6,.report-tile .nums .v,.set-block h3,.inf-name,.inf-contact h4,.inf-posts h4{
  color:var(--ui-heading);
}
.stat .delta{font-weight:700}
.stat .lbl{font-size:0.7rem}
.stat .val{font-size:1.62rem}
.stat .delta{font-size:0.76rem}
.entry-title{font-size:1rem}
.entry-sub{font-size:0.8rem}
.cov-tile h6{font-size:0.9rem}
.cov-tile .country{font-size:0.7rem}
.cov-tile .num{font-size:1.36rem}
.cov-tile .pct{font-size:0.78rem}
.cat-table,.job-row{font-size:0.86rem}
.cat-table th{font-size:0.68rem}
.cat-table-wrap,.jobs-list{overflow:auto}
.cat-table{min-width:760px}
.jobs-list{min-width:0}
.set-block h3{font-size:1rem}
.set-block{min-width:0}
.key-row{font-size:0.86rem}
.key-row{gap:12px}
.key-row .info{min-width:0}
.key-row .info b,.key-prefix,.meta{overflow-wrap:anywhere}
.key-row > div:last-child:not(.info){display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.meta{font-size:0.72rem}
.set-inp,.set-sel,.inf-sel,.inf-inp{font-size:0.84rem}
.starter .title{font-size:0.9rem}
.starter .desc{font-size:0.78rem}
.trace{font-size:0.82rem}
.report-tile h6{font-size:0.92rem}
.report-tile .nums .v{font-size:1rem}
.stats-hero{gap:14px}
.stats-hero .stat{position:relative;overflow:hidden;border-color:transparent;border-top:0}
.stats-hero .stat:before{content:"";position:absolute;inset:0 0 auto 0;height:44px;background:linear-gradient(180deg,rgba(124,58,237,.08),rgba(124,58,237,0));pointer-events:none}
.stats-hero .stat:first-child{
  background:linear-gradient(135deg,#ffffff,#f4ebff);
  border-color:#e6dbff;
  color:var(--ui-text);
  box-shadow:0 16px 36px rgba(124,58,237,.13);
}
.stats-hero .stat:first-child .lbl{color:#6d5c82}
.stats-hero .stat:first-child .val{color:var(--ui-purple-strong)}
.stats-hero .stat:first-child .delta{color:#047857}
.stats-hero .stat:first-child:before{background:linear-gradient(180deg,rgba(124,58,237,.08),rgba(124,58,237,0))}
.entry-card{
  background:linear-gradient(135deg,#fff,#f4eaff 58%,#fff7fb);
  border-color:#e4d7f7;
  box-shadow:0 16px 38px rgba(124,58,237,.12);
}
.entry-card:hover{background:linear-gradient(135deg,#fff,#f1e8ff);border-color:var(--ui-purple-line)}
.entry-icon{background:#ede4ff;color:var(--ui-purple);box-shadow:none}
.entry-arrow,.key-prefix,.cov-tile .num,.report-tile .num,.inf-stats .stat .val,.inf-contact b{color:var(--ui-purple)}
.overview-section{margin-top:20px;border-radius:12px;padding:16px;border-color:transparent;background:rgba(255,255,255,.70)}
.section-title{font-size:0.98rem;font-weight:850;color:var(--ui-heading);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.section-title:before{content:"";width:9px;height:9px;border-radius:50%;background:var(--ui-purple);box-shadow:0 0 0 4px rgba(124,58,237,.12)}
.cov-grid{gap:12px}
.cov-tile,.report-tile,.stat,.starter,.set-block{border-radius:10px}
.cov-tile,.report-tile{position:relative;overflow:hidden}
.cov-tile:before,.report-tile:before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 4px 4px 0;background:rgba(196,181,253,.55)}
.cov-tile,.report-tile{border-color:rgba(255,255,255,.85);box-shadow:0 16px 36px rgba(37,29,61,.12)}
.stat,.starter,.set-block,.inf-panel,.inf-placeholder-card{box-shadow:0 14px 32px rgba(37,29,61,.10)}
.cov-tile.healthy{border-color:rgba(16,185,129,.18)}
.cov-tile.healthy:before,.report-tile.healthy:before{background:rgba(5,150,105,.45)}
.cov-tile.warning{border-color:rgba(247,183,49,.22)}
.cov-tile.warning:before,.report-tile.warning:before{background:rgba(217,119,6,.45)}
.cov-tile.critical{border-color:rgba(251,113,133,.22)}
.cov-tile.critical:before,.report-tile.critical:before{background:rgba(220,38,38,.45)}
.cov-tile .bar,.report-tile .covbar{background:#eee6f7}
.cov-tile button,.mini-btn,.report-tile .btn-gen{
  background:var(--ui-purple-soft);
  border-color:#d8b4fe;
  color:#6d28d9;
}
.cov-tile button:hover,.mini-btn:hover,.report-tile .btn-gen:hover:not(:disabled){background:#eadcff}
.mini-btn.bad{background:#fff1f2;border-color:#fecdd3;color:#be123c}
.cat-table th,.job-row.head{background:var(--ui-card-soft);border-bottom-color:var(--ui-border)}
.cat-table td,.job-row,.post-info .cap,.inf-bio{color:var(--ui-text);border-bottom-color:var(--ui-border)}
.cat-table tr:hover,.job-row:hover:not(.head){background:#faf5ff}
.key-row{border-bottom-color:var(--ui-border)}
.thumb{background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#4c1d95}
.report-tile.ready{background:var(--ui-card);border-color:var(--ui-border-strong)}
.report-tile .nums .v.dim,.report-tile .badge.pending{color:var(--ui-muted)}
.pill.ok{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
.pill.warn{background:#fffbeb;color:#b45309;border-color:#fde68a}
.pill.bad{background:#fff1f2;color:#be123c;border-color:#fecdd3}
.pill.pending{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.inf-avatar,.post img{background:#f3e8ff;border-color:#d8b4fe}
.secret-box{color:#4c1d95}
.empty-state{padding:22px 16px;text-align:center;color:var(--ui-muted);font-size:0.9rem}
.empty-state b{display:block;color:var(--ui-heading);font-size:0.95rem;margin-bottom:4px}
.form-grid .wide{grid-column:1/-1}
.cat-table-empty{border-top:1px solid var(--ui-border)}
.settings-scroll-list{max-height:430px;overflow:auto;margin-top:8px;padding-right:4px}
.settings-scroll-list .key-row:last-child{border-bottom:0}
.settings-scroll-list::-webkit-scrollbar{width:8px}
.settings-scroll-list::-webkit-scrollbar-thumb{background:#d8cceb;border-radius:8px}
.hint-box{background:#f8f4ff;border:1px solid #e6d9fb;border-radius:9px;padding:10px 12px;color:var(--ui-muted);font-size:0.82rem;line-height:1.65;margin:8px 0 10px}
.hint-box b{color:var(--ui-heading)}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-size:0.7rem;font-weight:800;color:var(--ui-muted);letter-spacing:.7px;text-transform:uppercase}
.form-field small{font-size:0.68rem;color:var(--ui-dim);line-height:1.35}
.invite-code-box{display:flex;gap:8px;align-items:center;justify-content:space-between}
.invite-code-box code{font-family:'SF Mono',monospace;color:#4c1d95;font-size:0.78rem;word-break:break-all}
.invite-status{font-size:0.66rem;font-weight:800;padding:2px 7px;border-radius:999px;border:1px solid var(--ui-border)}
#app [style*="color:#fff"]{color:var(--ui-heading)!important}
#app [style*="color:#52527a"],#app [style*="color:#64647a"]{color:var(--ui-muted)!important}
#app [style*="background:#13111f"],#app [style*="background:#0d0a17"]{background:var(--ui-card-soft)!important}
#app [style*="border:1px solid #29213a"]{border-color:var(--ui-border)!important}

@media(max-width:1100px){
  .ask-shell{grid-template-columns:1fr}
  .set-grid{grid-template-columns:1fr}
  .subnav-layout{grid-template-columns:170px minmax(0,1fr)}
  .subnav-item{padding:9px 10px}
  .subnav-item small{font-size:0.64rem}
}
@media(max-width:760px){
  .page{padding:18px 14px 42px}
  .topbar{gap:8px;padding:10px 12px}
  .tab-row{order:5;flex-basis:100%;overflow-x:auto;flex-wrap:nowrap}
  .tab{white-space:nowrap}
  .stats-hero,.cov-grid,.report-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .job-row{grid-template-columns:48px minmax(110px,1fr) 92px 70px 70px 96px}
  .inf-workbench,.inf-placeholder{grid-template-columns:1fr}
}

/* ============ DARK THEME（html[data-theme="dark"]） ============ */
html[data-theme="dark"]{
  --ui-bg:#0a0612; --ui-bg-2:#0d0a17; --ui-card:#13111f; --ui-card-soft:#0d0a17;
  --ui-border:#29213a; --ui-border-strong:#3a2f56;
  --ui-text:#cbd5e1; --ui-heading:#ffffff; --ui-muted:#94a3b8; --ui-dim:#6b6480;
  --ui-purple:#a78bfa; --ui-purple-strong:#c4b5fd; --ui-purple-soft:rgba(167,139,250,.14); --ui-purple-line:rgba(167,139,250,.55);
  --ui-green:#6ee7b7; --ui-amber:#fcd34d; --ui-red:#fda4af;
}
html[data-theme="dark"],html[data-theme="dark"] body{background:linear-gradient(180deg,#0d0a17 0,#0a0612 210px,#0a0612 520px)}
html[data-theme="dark"] .topbar{background:linear-gradient(90deg,rgba(13,10,23,.92),rgba(19,17,31,.92));box-shadow:0 12px 30px rgba(0,0,0,.4)}
html[data-theme="dark"] .site-picker:hover,html[data-theme="dark"] .icon-btn:hover,html[data-theme="dark"] .acct:hover,html[data-theme="dark"] .acct.active{background:rgba(167,139,250,.10)}
html[data-theme="dark"] .tab{color:var(--ui-muted)}
html[data-theme="dark"] .tab.active{background:rgba(167,139,250,.18)}
html[data-theme="dark"] .usage-strip{background:rgba(16,185,129,.10);border-color:rgba(16,185,129,.25);color:#6ee7b7}
html[data-theme="dark"] .usage-strip b{color:#6ee7b7}
html[data-theme="dark"] .login-wrap{background:linear-gradient(180deg,#0a0612,#0d0a17)}
html[data-theme="dark"] .login-card,html[data-theme="dark"] .stat,html[data-theme="dark"] .ask-input,html[data-theme="dark"] .starter,html[data-theme="dark"] .trace,html[data-theme="dark"] .cat-filters,html[data-theme="dark"] .cat-table-wrap,html[data-theme="dark"] .cov-tile,html[data-theme="dark"] .report-tile,html[data-theme="dark"] .inf-card,html[data-theme="dark"] .jobs-list,html[data-theme="dark"] .set-block,html[data-theme="dark"] .inf-contact,html[data-theme="dark"] .post,html[data-theme="dark"] .overview-section{box-shadow:0 14px 34px rgba(0,0,0,.35)}
html[data-theme="dark"] .subnav{background:rgba(19,17,31,.72);box-shadow:0 10px 26px rgba(0,0,0,.25)}
html[data-theme="dark"] .subnav-item.active{background:rgba(167,139,250,.18)}
html[data-theme="dark"] .subnav-item.active small{color:var(--ui-muted)}
html[data-theme="dark"] .ask-input textarea::placeholder{color:#6b6480}
html[data-theme="dark"] .stats-hero .stat:first-child{background:linear-gradient(135deg,#1b1530,#241a3d);border-color:rgba(167,139,250,.3);box-shadow:0 16px 36px rgba(0,0,0,.35)}
html[data-theme="dark"] .stats-hero .stat:first-child .lbl{color:#b9aef0}
html[data-theme="dark"] .stats-hero .stat:first-child .delta{color:#6ee7b7}
html[data-theme="dark"] .entry-card{background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(59,124,229,.06));border-color:rgba(167,139,250,.3);box-shadow:0 16px 38px rgba(0,0,0,.3)}
html[data-theme="dark"] .entry-card:hover{background:linear-gradient(135deg,rgba(167,139,250,.20),rgba(59,124,229,.10))}
html[data-theme="dark"] .entry-icon{background:rgba(167,139,250,.16)}
html[data-theme="dark"] .overview-section{background:rgba(255,255,255,.03)}
html[data-theme="dark"] .cov-tile,html[data-theme="dark"] .report-tile{border-color:var(--ui-border);box-shadow:0 16px 36px rgba(0,0,0,.3)}
html[data-theme="dark"] .report-tile.empty{background:#13111f}
html[data-theme="dark"] .report-tile.ready{background:linear-gradient(180deg,#181024,#13111f);border-color:rgba(167,139,250,.40)}
html[data-theme="dark"] .stat,html[data-theme="dark"] .starter,html[data-theme="dark"] .set-block,html[data-theme="dark"] .inf-panel,html[data-theme="dark"] .inf-placeholder-card{box-shadow:0 14px 32px rgba(0,0,0,.28)}

html[data-theme="dark"] .cov-tile button,html[data-theme="dark"] .mini-btn,html[data-theme="dark"] .report-tile .btn-gen{border-color:rgba(167,139,250,.25);color:var(--ui-purple-strong)}
html[data-theme="dark"] .cov-tile button:hover,html[data-theme="dark"] .mini-btn:hover,html[data-theme="dark"] .report-tile .btn-gen:hover:not(:disabled){background:rgba(167,139,250,.22)}
html[data-theme="dark"] .mini-btn.bad{background:rgba(251,113,133,.14);border-color:rgba(251,113,133,.3);color:#fda4af}
html[data-theme="dark"] .cat-table tr:hover,html[data-theme="dark"] .job-row:hover:not(.head){background:rgba(167,139,250,.05)}

html[data-theme="dark"] .pill.warn{background:rgba(247,183,49,.14);color:#fcd34d;border-color:rgba(247,183,49,.3)}
html[data-theme="dark"] .pill.bad{background:rgba(251,113,133,.14);color:#fda4af;border-color:rgba(251,113,133,.3)}
html[data-theme="dark"] .pill.pending{background:rgba(96,165,250,.14);color:#93c5fd;border-color:rgba(96,165,250,.3)}
html[data-theme="dark"] .inf-avatar,html[data-theme="dark"] .post img{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.3)}
html[data-theme="dark"] .secret-box{color:#c4b5fd}
html[data-theme="dark"] .settings-scroll-list::-webkit-scrollbar-thumb{background:#3a2f56}
html[data-theme="dark"] .hint-box{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.2)}
html[data-theme="dark"] .invite-code-box code{color:#c4b5fd}
html[data-theme="dark"] .report-tile .badge.pending{background:rgba(167,139,250,.14);color:#c4b5fd;border:1px solid rgba(167,139,250,.3)}
html[data-theme="dark"] .report-tile .btn-muted{background:rgba(167,139,250,.14);border:1px solid rgba(167,139,250,.25);color:#c4b5fd}
html[data-theme="dark"] .inf-chip:hover{background:rgba(167,139,250,.10)}
html[data-theme="dark"] .inf-line{background:#29213a}
/* 内联深色样式补丁：暗色模式下保持原深色，不再翻成浅色 */
html[data-theme="dark"] #app [style*="color:#fff"]{color:#fff!important}
html[data-theme="dark"] #app [style*="background:#13111f"]{background:#13111f!important}
html[data-theme="dark"] #app [style*="background:#0d0a17"]{background:#0d0a17!important}
html[data-theme="dark"] #app [style*="border:1px solid #29213a"]{border-color:#29213a!important}

/* ============ 主题切换按钮（左下角） ============ */
#theme-toggle{position:fixed;left:18px;bottom:18px;z-index:9000;display:flex;align-items:center;gap:8px;
  background:var(--ui-card);border:1px solid var(--ui-border);color:var(--ui-text);
  padding:9px 14px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:0.8rem;font-weight:600;
  box-shadow:0 8px 24px rgba(37,29,61,.18);transition:all .18s}
#theme-toggle:hover{border-color:var(--ui-purple-line);transform:translateY(-1px)}
html[data-theme="dark"] #theme-toggle{box-shadow:0 8px 24px rgba(0,0,0,.4)}
#theme-toggle .ico{font-size:1rem;line-height:1}
</style>
</head>
<body>
<script>
/* 主题初始化：在首屏绘制前应用，避免闪烁。默认浅色。 */
(function(){
  try{
    var t = localStorage.getItem('sc_theme') || 'light';
    if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
  }catch(e){}
})();
</script>
<div id="app"></div>

<!-- 主题切换按钮（左下角，独立于 Vue） -->
<button id="theme-toggle" type="button" aria-label="切换主题">
  <span class="ico">🌙</span><span class="txt">暗色</span>
</button>
<script>
(function(){
  var btn = document.getElementById('theme-toggle');
  var root = document.documentElement;
  function render(){
    var dark = root.getAttribute('data-theme') === 'dark';
    btn.querySelector('.ico').textContent = dark ? '☀️' : '🌙';
    btn.querySelector('.txt').textContent = dark ? '浅色' : '暗色';
  }
  btn.addEventListener('click', function(){
    var dark = root.getAttribute('data-theme') === 'dark';
    if(dark){ root.removeAttribute('data-theme'); try{localStorage.setItem('sc_theme','light')}catch(e){} }
    else   { root.setAttribute('data-theme','dark'); try{localStorage.setItem('sc_theme','dark')}catch(e){} }
    render();
  });
  render();
})();
</script>

<script>
const { createApp, ref, computed, onMounted } = Vue;

const App = {
  setup() {
    const token = ref(localStorage.getItem('sc_token') || '');
    const user = ref({});
    const loginMode = ref('login');
    const loginForm = ref({ identifier: '', password: '' });
    const registerForm = ref({ username:'', email:'', display_name:'', password:'', confirm_password:'', invite_code:'' });
    const loginErr = ref('');
    const logging = ref(false);
    const accountForm = ref({ display_name:'' });
    const passwordForm = ref({ old_password:'', new_password:'', confirm_password:'' });
    const newKeyName = ref('智能助手接口密钥');
    const createdKey = ref('');
    const users = ref([]);
    const invites = ref([]);
    const inviteForm = ref({ target_type:'new_workspace', workspace_id:'', max_uses:1, expires_in_days:7, default_role:'user' });
    const newInviteCode = ref('');
    const adminUserForm = ref({ username:'', email:'', display_name:'', role:'user', password:'' });
    const createdUserPassword = ref('');
    const workspaces = ref([]);
    const currentWorkspaceId = ref(localStorage.getItem('sc_workspace_id') || '');
    const workspaceForm = ref({ name:'', slug:'' });
    const workspaceSites = ref([]);
    const addWorkspaceSiteForm = ref({ site:'' });
    const settingsSection = ref('workspace');
    const accountSection = ref('profile');

    async function doLogin() {
      loginErr.value = ''; logging.value = true;
      try {
        const r = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(loginForm.value)
        });
        const d = await r.json();
        if (!r.ok) { loginErr.value = d.detail || '登录失败'; return; }
        token.value = d.token; user.value = d;
        currentWorkspaceId.value = '';
        localStorage.removeItem('sc_workspace_id');
        localStorage.setItem('sc_token', d.token);
        localStorage.setItem('sc_user', JSON.stringify(d));
        await loadAll();
      } catch(e) { loginErr.value = '网络错误'; }
      finally { logging.value = false; }
    }
    async function doRegister() {
      loginErr.value = ''; logging.value = true;
      try {
        const r = await fetch('/api/auth/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(registerForm.value)
        });
        const d = await r.json();
        if (!r.ok) { loginErr.value = d.detail || '注册失败'; return; }
        token.value = d.token; user.value = d;
        currentWorkspaceId.value = '';
        localStorage.removeItem('sc_workspace_id');
        localStorage.setItem('sc_token', d.token);
        localStorage.setItem('sc_user', JSON.stringify(d));
        await loadAll();
      } catch(e) { loginErr.value = '网络错误'; }
      finally { logging.value = false; }
    }
	    async function logout() {
	      try { await fetch('/api/auth/logout', { method:'POST', headers: authH() }); } catch(e) {}
	      localStorage.removeItem('sc_token'); localStorage.removeItem('sc_user');
	      localStorage.removeItem('sc_workspace_id');
	      history.replaceState(null, '', location.pathname + location.search);
	      token.value = ''; user.value = {};
	      currentWorkspaceId.value = '';
	    }
	    async function openAccount() {
	      setTab('account');
	      await Promise.all([loadKeys(), loadBilling()]);
	    }
	    function authH() {
      const h = { 'Authorization': 'Bearer ' + token.value };
      if (currentWorkspaceId.value) h['X-Workspace-ID'] = String(currentWorkspaceId.value);
      return h;
    }
    async function apiJson(path, opts={}) {
      const headers = { ...(opts.headers || {}), ...authH() };
      if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      const r = await fetch(path, { ...opts, headers });
      const d = await r.json().catch(()=>({}));
      if (!r.ok) throw new Error(d.detail || `HTTP ${r.status}`);
      return d;
    }

    const allowedTabs = new Set(['overview', 'report', 'ask', 'catalog', 'coverage', 'jobs', 'influencers', 'settings', 'account']);
    function initialTab() {
      const hashTab = (location.hash || '').replace(/^#\/?/, '');
      if (allowedTabs.has(hashTab)) return hashTab;
      return 'overview';
    }
    const tab = ref(initialTab());
    function setTab(next) {
      if (!allowedTabs.has(next)) next = 'overview';
      tab.value = next;
      const hash = `#${next}`;
      if (location.hash !== hash) history.replaceState(null, '', hash);
      if (next === 'catalog') loadProducts();
      if (next === 'coverage') loadCoverage();
      if (next === 'jobs') loadJobs();
    }
    window.addEventListener('hashchange', () => {
      const next = (location.hash || '').replace(/^#\/?/, '');
      if (allowedTabs.has(next) && next !== tab.value) setTab(next);
    });
    const sites = ref([]);
    const selectedSite = ref('');
    const coverage = ref({ summary:{}, sites:[] });
    const jobs = ref([]);
    const products = ref({ items:[], total:null });
    const productsLoading = ref(false);
    const proxyStatus = ref({});
    const billing = ref({ keys:[] });
    const apiKeys = ref([]);
    const toast = ref('');
    function showToast(m) { toast.value = m; setTimeout(()=> toast.value='', 2000); }

    const askResult = ref(null);
    const askRunning = ref(false);
    const askInput = ref('');

    const infPlatform = ref('instagram');
    const infUsername = ref('cristiano');
    const infResult = ref(null);
    const infRunning = ref(false);
    const infQuickTargets = [
      { platform:'instagram', username:'cristiano', label:'Cristiano', meta:'Instagram' },
      { platform:'youtube', username:'MrBeast', label:'MrBeast', meta:'YouTube' },
      { platform:'tiktok', username:'khaby.lame', label:'Khaby Lame', meta:'TikTok' },
      { platform:'twitter', username:'elonmusk', label:'Elon Musk', meta:'X' },
    ];
    function setInfluencerTarget(target) {
      infPlatform.value = target.platform;
      infUsername.value = target.username;
    }
    async function infFetch() {
      if (!infUsername.value.trim()) return;
      infRunning.value = true;
      infResult.value = null;
      try {
        const u = encodeURIComponent(infUsername.value.trim());
        const r = await fetch(`/api/influencers/full?platform=${infPlatform.value}&username=${u}&posts_limit=12`, { headers: authH() });
        if (r.ok) infResult.value = await r.json();
        else {
          const e = await r.json().catch(()=>({}));
          infResult.value = { error: e.detail || `HTTP ${r.status}` };
        }
      } catch(e) { infResult.value = { error: e.message }; }
      finally { infRunning.value = false; }
    }
    const starters = [
      { icon:'📊', title:'总览快照', desc:'当前工作区覆盖率和商品总数', key:'overview' },
      { icon:'🆕', title:'今日变化', desc:'昨日新增和变化', key:'new' },
      { icon:'⚠️', title:'失败任务', desc:'采集异常列表', key:'failed' },
      { icon:'🔔', title:'代理池', desc:'10 代理调用统计', key:'proxy' },
      { icon:'🚀', title:'触发抓取', desc:'触发当前选中站点', key:'trigger' },
    ];
    const askTypeLabels = {
      overview:'总览快照',
      new:'今日变化',
      failed:'失败任务',
      proxy:'代理池',
      trigger:'触发抓取',
    };
    function askTypeLabel(key) {
      return askTypeLabels[key] || key;
    }
    function formatRole(role) {
      return ({ admin:'管理员', user:'普通用户', viewer:'只读用户' })[role] || role || '—';
    }
    function formatGlobalRole(role) {
      return ({ super_admin:'超级管理员' })[role] || role || '—';
    }
    function formatAccountStatus(status) {
      return ({ active:'正常', disabled:'已禁用', pending:'待启用' })[status] || status || '正常';
    }
    function formatJobStatus(status) {
      return ({ success:'成功', running:'运行中', failed:'失败', queued:'排队中', pending:'等待中' })[status] || status || '—';
    }
    function formatProductStatus(status) {
      return ({ on_sale:'在售', out_of_stock:'缺货', active:'正常', inactive:'下架' })[status] || status || '—';
    }
    function formatScope(scope) {
      return ({
        'crawler:read':'读取爬虫数据',
        'crawler:scrape':'单页抓取',
        'crawler:crawl':'整站抓取',
        'admin:*':'管理员',
      })[scope] || scope;
    }
    function formatWorkspaceName(workspace) {
      const name = typeof workspace === 'string' ? workspace : (workspace?.name || '');
      return ({ 'Internal Workspace':'内部工作区' })[name] || name || '—';
    }
    function inferAskKey() {
      const q = askInput.value.trim().toLowerCase();
      if (!q) return 'overview';
      if (q.includes('代理') || q.includes('proxy')) return 'proxy';
      if (q.includes('失败') || q.includes('异常') || q.includes('job')) return 'failed';
      if (q.includes('新增') || q.includes('变化') || q.includes('delta') || q.includes('今日')) return 'new';
      if (q.includes('触发') || q.includes('抓取') || q.includes('crawl')) return 'trigger';
      return 'overview';
    }
    async function runAskInput() {
      await runStarter(inferAskKey());
    }
    async function runStarter(key) {
      askRunning.value = true;
      askResult.value = { type:key, data:null };
      try {
        if (key === 'overview') {
          const r = await fetch('/api/coverage', { headers: authH() });
          askResult.value.data = await r.json();
        } else if (key === 'new') {
          const r = await fetch('/api/daily-delta/latest', { headers: authH() });
          askResult.value.data = await r.json();
        } else if (key === 'failed') {
          const r = await fetch('/api/jobs?limit=30', { headers: authH() });
          const all = await r.json();
          askResult.value.data = (Array.isArray(all)?all:all.items||[]).filter(j=>j.status==='failed').slice(0,15);
        } else if (key === 'proxy') {
          const r = await fetch('/api/proxy/status', { headers: authH() });
          askResult.value.data = await r.json();
        } else if (key === 'trigger') {
          if (!selectedSite.value && sites.value.length) selectedSite.value = sites.value[0].site;
          if (!selectedSite.value) {
            askResult.value.data = { msg:'当前工作区还没有可触发的站点' };
          } else {
            await triggerSite(selectedSite.value);
            askResult.value.data = { msg:`已触发 ${selectedSite.value}`, site:selectedSite.value };
          }
        }
      } catch(e) { showToast('查询失败'); }
      finally { askRunning.value = false; }
    }

    async function loadSites() {
      const r = await fetch('/api/sites', { headers: authH() });
      sites.value = await r.json();
      if (sites.value.length && !sites.value.some(s=>s.site===selectedSite.value)) {
        selectedSite.value = sites.value[0].site;
      }
    }
    async function loadCoverage() {
      const r = await fetch('/api/coverage', { headers: authH() });
      coverage.value = await r.json();
    }
    async function loadJobs() {
      const r = await fetch('/api/jobs?limit=60', { headers: authH() });
      const d = await r.json();
      jobs.value = Array.isArray(d) ? d : (d.items || []);
    }
    async function loadProducts() {
      if (!selectedSite.value) return;
      productsLoading.value = true;
      try {
        const r = await fetch(`/api/products?site=${encodeURIComponent(selectedSite.value)}&page_size=30`, { headers: authH() });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        products.value = await r.json();
      } catch(e) {
        products.value = { items:[], total:0, error:e.message };
        showToast('商品加载失败');
      } finally {
        productsLoading.value = false;
      }
    }
    async function loadProxy() {
      try {
        const r = await fetch('/api/proxy/status', { headers: authH() });
        proxyStatus.value = await r.json();
      } catch(e) {}
    }
    async function loadBilling() {
      try {
        const r = await fetch('/api/billing/usage', { headers: authH() });
        billing.value = await r.json();
      } catch(e) {}
    }
    async function loadKeys() {
      try {
        const r = await fetch('/api/keys', { headers: authH() });
        apiKeys.value = await r.json();
      } catch(e) {}
    }
    async function loadMe() {
      try {
        const d = await apiJson('/api/me');
        user.value = d;
        workspaces.value = d.workspaces || [];
        const allowedWorkspaceIds = new Set(workspaces.value.map(w => String(w.id)));
        if (!allowedWorkspaceIds.has(String(currentWorkspaceId.value))) {
          currentWorkspaceId.value = d.current_workspace_id ? String(d.current_workspace_id) :
            (workspaces.value[0] ? String(workspaces.value[0].id) : '');
        }
        if (currentWorkspaceId.value) {
          localStorage.setItem('sc_workspace_id', currentWorkspaceId.value);
          if (!inviteForm.value.workspace_id) inviteForm.value.workspace_id = String(currentWorkspaceId.value);
        } else {
          localStorage.removeItem('sc_workspace_id');
        }
        accountForm.value.display_name = d.display_name || d.username || '';
        localStorage.setItem('sc_user', JSON.stringify(d));
      } catch(e) {
        logout();
      }
    }
    async function loadAdmin() {
      if (!canAdmin.value) return;
      try {
        users.value = await apiJson('/api/admin/users');
        invites.value = await apiJson('/api/admin/invites');
        workspaces.value = await apiJson('/api/workspaces');
        await loadWorkspaceSites();
      } catch(e) {}
    }
    async function loadAll() {
      const cached = localStorage.getItem('sc_user');
      if (cached) try { user.value = JSON.parse(cached); } catch {}
      await loadMe();
      await Promise.all([loadSites(), loadCoverage(), loadJobs(), loadProxy(), loadBilling(), loadKeys(), loadAdmin()]);
    }
    async function saveAccount() {
      try {
        user.value = await apiJson('/api/me', { method:'PATCH', body: JSON.stringify(accountForm.value) });
        localStorage.setItem('sc_user', JSON.stringify(user.value));
        showToast('账号已更新');
      } catch(e) { showToast(e.message); }
    }
    async function changePassword() {
      try {
        await apiJson('/api/auth/change-password', { method:'POST', body: JSON.stringify(passwordForm.value) });
        passwordForm.value = { old_password:'', new_password:'', confirm_password:'' };
        showToast('密码已更新');
      } catch(e) { showToast(e.message); }
    }
    async function createMyKey() {
      try {
        const d = await apiJson('/api/keys', { method:'POST', body: JSON.stringify({ name:newKeyName.value }) });
        createdKey.value = d.key;
        await Promise.all([loadKeys(), loadBilling()]);
        showToast('接口密钥已创建');
      } catch(e) { showToast(e.message); }
    }
    async function revokeKey(id) {
      try {
        await apiJson(`/api/keys/${id}`, { method:'DELETE' });
        await Promise.all([loadKeys(), loadBilling()]);
        showToast('接口密钥已停用');
      } catch(e) { showToast(e.message); }
    }
    async function createInvite() {
      try {
        const workspaceId = inviteForm.value.target_type === 'workspace'
          ? (inviteForm.value.workspace_id || currentWorkspaceId.value)
          : null;
        const d = await apiJson('/api/admin/invites', {
          method:'POST',
          body: JSON.stringify({
            ...inviteForm.value,
            workspace_id: workspaceId ? Number(workspaceId) : null,
          })
        });
        newInviteCode.value = d.code;
        await loadAdmin();
        showToast('邀请码已创建');
      } catch(e) { showToast(e.message); }
    }
    async function disableInvite(id) {
      try {
        await apiJson(`/api/admin/invites/${id}`, { method:'PATCH', body: JSON.stringify({ active:false }) });
        await loadAdmin();
        showToast('邀请码已禁用');
      } catch(e) { showToast(e.message); }
    }
    async function copyInviteCode() {
      if (!newInviteCode.value) return;
      try {
        await navigator.clipboard.writeText(newInviteCode.value);
        showToast('邀请码已复制');
      } catch(e) {
        showToast('复制失败，请手动选中邀请码');
      }
    }
    async function toggleUser(row) {
      try {
        const next = row.status === 'active' ? 'disabled' : 'active';
        await apiJson(`/api/admin/users/${row.id}`, { method:'PATCH', body: JSON.stringify({ status:next }) });
        await loadAdmin();
        showToast('用户状态已更新');
      } catch(e) { showToast(e.message); }
    }
    async function resetUserPassword(row) {
      try {
        const d = await apiJson(`/api/admin/users/${row.id}/reset-password`, { method:'POST', body: JSON.stringify({}) });
        createdUserPassword.value = `${row.username}: ${d.temporary_password}`;
        showToast('临时密码已生成');
      } catch(e) { showToast(e.message); }
    }
    async function createAdminUser() {
      try {
        const d = await apiJson('/api/admin/users', { method:'POST', body: JSON.stringify({ ...adminUserForm.value, workspace_id:Number(currentWorkspaceId.value) }) });
        createdUserPassword.value = `${d.username}: ${d.temporary_password}`;
        adminUserForm.value = { username:'', email:'', display_name:'', role:'user', password:'' };
        await loadAdmin();
        showToast('用户已创建');
      } catch(e) { showToast(e.message); }
    }
    async function switchWorkspace() {
      localStorage.setItem('sc_workspace_id', currentWorkspaceId.value);
      inviteForm.value.workspace_id = String(currentWorkspaceId.value || '');
      selectedSite.value = '';
      products.value = { items:[], total:null };
      await Promise.all([loadSites(), loadCoverage(), loadJobs(), loadBilling(), loadKeys(), loadWorkspaceSites()]);
      if (sites.value.length) selectedSite.value = sites.value[0].site;
      if (tab.value === 'catalog') await loadProducts();
      showToast('工作区已切换');
    }
    async function createWorkspace() {
      try {
        const d = await apiJson('/api/admin/workspaces', { method:'POST', body: JSON.stringify(workspaceForm.value) });
        workspaces.value = await apiJson('/api/workspaces');
        currentWorkspaceId.value = String(d.id);
        inviteForm.value.workspace_id = String(d.id);
        localStorage.setItem('sc_workspace_id', currentWorkspaceId.value);
        workspaceForm.value = { name:'', slug:'' };
        await switchWorkspace();
      } catch(e) { showToast(e.message); }
    }
    async function loadWorkspaceSites() {
      if (!canManageWorkspaces.value || !currentWorkspaceId.value) return;
      try {
        workspaceSites.value = await apiJson(`/api/admin/workspaces/${currentWorkspaceId.value}/sites`);
      } catch(e) {}
    }
    async function addWorkspaceSite() {
      try {
        await apiJson(`/api/admin/workspaces/${currentWorkspaceId.value}/sites`, { method:'POST', body: JSON.stringify(addWorkspaceSiteForm.value) });
        addWorkspaceSiteForm.value = { site:'' };
        await Promise.all([loadWorkspaceSites(), loadSites(), loadCoverage()]);
        showToast('站点已加入工作区');
      } catch(e) { showToast(e.message); }
    }
    async function toggleWorkspaceSite(row) {
      try {
        await apiJson(`/api/admin/workspaces/${currentWorkspaceId.value}/sites/${row.id}`, { method:'PATCH', body: JSON.stringify({ enabled:!row.enabled }) });
        await Promise.all([loadWorkspaceSites(), loadSites(), loadCoverage()]);
      } catch(e) { showToast(e.message); }
    }
    async function updateUserRole(row) {
      try {
        await apiJson(`/api/admin/users/${row.id}`, { method:'PATCH', body: JSON.stringify({ role:row.role }) });
        await loadAdmin();
        showToast('角色已更新');
      } catch(e) { showToast(e.message); }
    }
    async function triggerSite(site) {
      const r = await fetch(`/api/jobs/trigger?site=${encodeURIComponent(site)}`, { method:'POST', headers: authH() });
      if (r.ok) showToast('已触发 ' + site);
      else showToast('触发失败');
      setTimeout(loadJobs, 1500);
    }
    function exportCSV() {
      if (!selectedSite.value && sites.value.length) selectedSite.value = sites.value[0].site;
      if (!selectedSite.value) { showToast('没有可导出的站点'); return; }
      const params = new URLSearchParams({
        token: token.value,
        site: selectedSite.value,
        format: 'csv',
      });
      if (currentWorkspaceId.value) params.set('workspace_id', currentWorkspaceId.value);
      window.open(`/api/export/products?${params}`, '_blank');
    }

    const totalSku = computed(() => coverage.value.summary?.total_current_sku || 0);
    const coveragePct = computed(() => coverage.value.summary?.overall_coverage_pct || 0);
    const healthySites = computed(() => coverage.value.summary?.healthy_count || 0);
    const criticalSites = computed(() => coverage.value.summary?.critical_count || 0);
    const warningSites = computed(() => coverage.value.summary?.warning_count || 0);
    const runningJobs = computed(() => jobs.value.filter(j=>j.status==='running').length);
    const successJobs = computed(() => jobs.value.filter(j=>j.status==='success').length);
    const proxyOk = computed(() => proxyStatus.value?.available || 0);
    const proxyTotal = computed(() => proxyStatus.value?.total || 0);
    const sortedCov = computed(() => (coverage.value.sites || []).slice().sort((a,b)=>b.coverage_pct - a.coverage_pct));
    const canAdmin = computed(() => user.value.role === 'admin' || user.value.global_role === 'super_admin');
    const canManageWorkspaces = computed(() => user.value.global_role === 'super_admin' || (user.value.username === 'admin' && user.value.role === 'admin'));
    const settingsMenu = computed(() => [

            <div class="stat"><div class="lbl">帖子</div><div class="val">{{ (infResult.profile.posts_count || 0).toLocaleString() }}</div></div>
            <div v-if="infResult.profile.likes_total" class="stat"><div class="lbl">总点赞</div><div class="val">{{ infResult.profile.likes_total.toLocaleString() }}</div></div>
            <div class="stat"><div class="lbl">分类</div><div class="val small">{{ infResult.profile.category || '—' }}</div></div>
            <div class="stat"><div class="lbl">采集源</div><div class="val small">{{ infResult.profile.fetched_via || '—' }}</div></div>
          </div>
          <div class="inf-contact">
            <h4>📬 联系方式</h4>
            <div>📧 邮箱：<b>{{ infResult.profile.contact.email || '—' }}</b></div>
            <div>📱 WhatsApp：<b>{{ infResult.profile.contact.whatsapp || '—' }}</b></div>
            <div>🌐 主页链接：<b><a v-if="infResult.profile.external_url" :href="infResult.profile.external_url" target="_blank" rel="noopener">{{ infResult.profile.external_url }}</a><span v-else>—</span></b></div>
            <div>🔗 linktree：<b>{{ infResult.profile.contact.linktree || '—' }}</b></div>
          </div>

          <div v-if="infResult.posts && infResult.posts.length" class="inf-posts">
            <h4>📝 近期 {{ infResult.posts.length }} 条帖子</h4>
            <div class="post-grid">
              <a v-for="p in infResult.posts" :key="p.post_id" :href="p.post_url" target="_blank" rel="noopener" class="post">
                <img v-if="p.thumbnail_url" :src="p.thumbnail_url" referrerpolicy="no-referrer"/>
                <div class="post-info">
                  <div class="cap">{{ (p.caption || '').slice(0, 100) }}</div>
                  <div class="metrics">
                    <span v-if="p.likes">❤️ {{ p.likes.toLocaleString() }}</span>
                    <span v-if="p.comments">💬 {{ p.comments.toLocaleString() }}</span>
                    <span v-if="p.views">👁 {{ p.views.toLocaleString() }}</span>
                  </div>
                </div>
              </a>
            </div>
          </div>
          <div v-else style="color:#52527a;text-align:center;padding:20px">无近期帖子（平台可能受限，或账号受保护）</div>
        </div>
      </div>

	      <div v-if="tab==='settings'" class="page">
	        <div class="lead">设置</div>
	        <div class="sub">工作区 · 用户管理 · 邀请码 · 代理池 · 文档</div>

        <div class="subnav-layout">
          <nav class="subnav" aria-label="设置二级菜单">
            <button
              v-for="item in settingsMenu"
              :key="item.key"
              class="subnav-item"
              :class="{active: activeSettingsSection===item.key}"
              @click="settingsSection=item.key"
            >
              <span>{{ item.label }}</span>
              <small>{{ item.desc }}</small>
            </button>
          </nav>

          <div class="subnav-content">
          <div v-if="activeSettingsSection==='workspace'" class="set-block">
            <h3>🏢 工作区</h3>
            <div class="form-grid one">
              <select class="set-sel" v-model="currentWorkspaceId" @change="switchWorkspace">
                <option v-for="w in workspaces" :key="w.id" :value="String(w.id)">{{ formatWorkspaceName(w) }}</option>
              </select>
            </div>
            <div class="key-row">
              <div class="info">
                <b>{{ formatWorkspaceName(workspaces.find(w=>String(w.id)===String(currentWorkspaceId))) }}</b>
                <span class="meta">当前看板、报告和导出按这个工作区隔离</span>
              </div>
            </div>
            <template v-if="canManageWorkspaces">
              <div class="form-grid">
                <input class="set-inp" v-model="workspaceForm.name" placeholder="新工作区名称"/>
                <input class="set-inp" v-model="workspaceForm.slug" placeholder="工作区标识"/>
	                <button class="mini-btn wide" @click="createWorkspace">创建工作区</button>
              </div>
            </template>
          </div>

          <div v-if="activeSettingsSection==='workspace_sites' && canManageWorkspaces" class="set-block">
            <h3>🌐 工作区站点</h3>
            <div class="form-grid">
              <input class="set-inp" v-model="addWorkspaceSiteForm.site" placeholder="全局站点编码，例如 songmics_us"/>
              <button class="mini-btn wide" @click="addWorkspaceSite">加入站点</button>
            </div>
            <div class="settings-scroll-list">
              <div v-for="s in workspaceSites" :key="s.id" class="key-row">
                <div class="info">
                  <b>{{ s.site }}</b>
                  <span class="key-prefix">{{ s.brand || '—' }} · {{ s.country || '—' }}</span>
                  <span class="meta">状态={{ s.enabled ? '启用' : '停用' }} · 隐藏={{ s.hidden ? '是' : '否' }}</span>
                </div>
                <button class="mini-btn" :class="s.enabled?'bad':''" @click="toggleWorkspaceSite(s)">{{ s.enabled ? '停用' : '启用' }}</button>
              </div>
              <div v-if="!workspaceSites.length" class="empty-state">
                <b>暂无工作区站点</b>
                先把全局站点编码加入当前工作区
              </div>
            </div>
          </div>

	          <div v-if="activeSettingsSection==='users' && canAdmin" class="set-block">
            <h3>👥 用户管理</h3>
            <div class="form-grid">
              <input class="set-inp" v-model="adminUserForm.username" placeholder="用户名"/>
              <input class="set-inp" v-model="adminUserForm.email" placeholder="邮箱"/>
              <input class="set-inp" v-model="adminUserForm.display_name" placeholder="显示名"/>
              <select class="set-sel" v-model="adminUserForm.role">
                <option value="user">普通用户</option>
                <option value="viewer">只读用户</option>
                <option value="admin">管理员</option>
              </select>
              <input class="set-inp" type="password" v-model="adminUserForm.password" placeholder="密码，留空自动生成"/>
              <button class="mini-btn wide" @click="createAdminUser">创建用户</button>
            </div>
            <div v-if="createdUserPassword" class="secret-box">{{ createdUserPassword }}</div>
            <div class="settings-scroll-list">
              <div v-for="u in users" :key="u.id" class="key-row">
                <div class="info">
                  <b>{{ u.display_name || u.username }}</b>
                  <span class="key-prefix">{{ u.email }} · @{{ u.username }}</span>
                  <span class="meta">角色={{ formatRole(u.role) }} · 状态={{ formatAccountStatus(u.status) }}</span>
                </div>
                <div style="display:flex;gap:6px">
                  <select class="set-sel" style="width:92px" v-model="u.role" @change="updateUserRole(u)">
                    <option value="admin">管理员</option>
                    <option value="user">普通用户</option>
                    <option value="viewer">只读用户</option>
                  </select>
                  <button class="mini-btn" @click="resetUserPassword(u)">重置密码</button>
                  <button class="mini-btn bad" @click="toggleUser(u)">{{ u.status==='active' ? '禁用' : '启用' }}</button>
                </div>
              </div>
              <div v-if="!users.length" class="empty-state">
                <b>暂无用户</b>
                创建用户后会显示在这里
              </div>
            </div>
          </div>

          <div v-if="activeSettingsSection==='invites' && canAdmin" class="set-block">
            <h3>🎟 邀请注册</h3>
            <div class="hint-box">
              <b>用途：</b>生成一个注册通行证，发给外部用户。
              <template v-if="inviteForm.target_type==='new_workspace'">
                用户注册后会自动创建自己的新租户，并成为该租户负责人。
              </template>
              <template v-else>
                用户注册后会加入
                <b>{{ formatWorkspaceName(workspaces.find(w=>String(w.id)===String(inviteForm.workspace_id || currentWorkspaceId))) }}</b>。
              </template>
              明文只显示一次，历史列表只保留前缀。
            </div>
            <div class="form-grid">
              <div class="form-field wide">
                <label>邀请类型</label>
                <select class="set-sel" v-model="inviteForm.target_type">
                  <option value="new_workspace">创建注册用户自己的新租户</option>
                  <option value="workspace">加入已有租户 / 工作区</option>
                </select>
                <small>外部新客户用“自己的新租户”；邀请同事进现有租户时才选“已有租户”。</small>
              </div>
              <div class="form-field wide" v-if="canManageWorkspaces && inviteForm.target_type==='workspace'">
                <label>加入哪个租户 / 工作区</label>
                <select class="set-sel" v-model="inviteForm.workspace_id">
                  <option v-for="w in workspaces" :key="w.id" :value="String(w.id)">{{ formatWorkspaceName(w) }}</option>
                </select>
                <small>只有内部协作或给同一客户加成员时使用这个模式。</small>
              </div>
              <div class="form-field">
                <label>可注册人数</label>
                <input class="set-inp" type="number" min="1" v-model="inviteForm.max_uses" placeholder="例如 1"/>
                <small>填 1 表示只能被一个人注册使用。</small>
              </div>
              <div class="form-field">
                <label>有效期</label>
                <input class="set-inp" type="number" min="1" v-model="inviteForm.expires_in_days" placeholder="例如 7"/>
                <small>超过天数后自动失效。</small>
              </div>
              <div class="form-field">
                <label>注册后角色</label>
                <select class="set-sel" v-model="inviteForm.default_role">
                  <option value="user">普通用户 · 可使用功能</option>
                  <option value="viewer">只读用户 · 只读查看</option>
                </select>
                <small>邀请码不能创建管理员，管理员需内部创建。</small>
              </div>
              <button class="mini-btn wide" @click="createInvite">生成注册邀请码</button>
            </div>
            <div v-if="newInviteCode" class="secret-box invite-code-box">
              <div>
                <div class="meta">完整邀请码，只显示这一次</div>
                <code>{{ newInviteCode }}</code>
              </div>
              <button class="mini-btn" @click="copyInviteCode">复制</button>
            </div>
            <div class="settings-scroll-list">
              <div v-for="i in invites" :key="i.id" class="key-row">
                <div class="info">
                  <b>{{ i.code_prefix }}</b>
                  <span class="key-prefix">
                    {{ (i.target_type || 'workspace') === 'new_workspace' ? '注册后创建自己的租户' : (formatWorkspaceName(workspaces.find(w=>String(w.id)===String(i.workspace_id))) || ('工作区 #' + (i.workspace_id || '—'))) }}
                    · 注册角色 {{ formatRole(i.default_role) }}
                  </span>
                  <span class="meta">使用进度 {{ i.used_count }}/{{ i.max_uses }} · 过期 {{ i.expires_at ? i.expires_at.slice(0, 10) : '—' }} · 最近使用 {{ i.last_used_at ? i.last_used_at.slice(0, 10) : '未使用' }}</span>
                </div>
                <div>
                  <span class="invite-status" :class="i.active ? 'pill ok' : 'pill bad'">{{ i.active ? '可用' : '已禁用' }}</span>
                  <button v-if="i.active" class="mini-btn bad" @click="disableInvite(i.id)">禁用</button>
                </div>
              </div>
              <div v-if="!invites.length" class="empty-state">
                <b>暂无邀请码</b>
                生成后把完整邀请码发给需要注册的用户。
              </div>
            </div>
          </div>

          <div v-if="activeSettingsSection==='proxy'" class="set-block">
            <h3>🌐 代理池 ({{ proxyOk }}/{{ proxyTotal }})</h3>
            <div v-for="p in (proxyStatus.details||[]).slice(0,5)" :key="p.url" class="key-row">
              <div class="info">
                <span class="key-prefix">{{ (p.url||'').slice(7, 45) }}…</span>
                <span class="meta">成功={{ p.success_count }} 失败={{ p.fail_count }}</span>
              </div>
              <span class="pill" :class="p.fail_count>3?'bad':'ok'">{{ p.fail_count>3?'⚠':'✓' }}</span>
            </div>
            <div v-if="!(proxyStatus.details||[]).length" style="color:#52527a;font-size:0.78rem;padding:14px 0;text-align:center">代理状态未加载</div>
          </div>

          <div v-if="activeSettingsSection==='docs'" class="set-block">
            <h3>📚 文档 · 工具</h3>
            <div style="font-size:0.84rem;line-height:1.9">
              <div>📊 <a href="/d/morning_report_2026-05-25.html" target="_blank" rel="noopener">24 小时战报</a></div>
              <div>🎯 <a href="/d/customer_dashboard_v7_unified.html" target="_blank" rel="noopener">客户视角看板</a></div>
              <div>📋 <a href="/d/aosen_80pct_daily_plan.html" target="_blank" rel="noopener">遨森 80% 方案</a></div>
              <div>🌐 <a href="/d/platform_expansion_roadmap.html" target="_blank" rel="noopener">平台扩展路线图</a></div>
              <div>🔬 <a href="/d/scrapling_design_research.html" target="_blank" rel="noopener">Scrapling 研究</a></div>
              <div>📚 <a href="/llms.txt" target="_blank" rel="noopener">AI 入口说明</a></div>
              <div>🧪 <a href="/docs" target="_blank" rel="noopener">接口文档</a></div>
            </div>
          </div>
          </div>
	        </div>
	      </div>

	      <div v-if="tab==='account'" class="page">
	        <div class="lead">账号</div>
	        <div class="sub">个人资料 · 密码安全 · 接口密钥 · 用量 · 当前工作区</div>

	        <div class="subnav-layout">
	          <nav class="subnav" aria-label="账号二级菜单">
	            <button
	              v-for="item in accountMenu"
	              :key="item.key"
	              class="subnav-item"
	              :class="{active: activeAccountSection===item.key}"
	              @click="accountSection=item.key"
	            >
	              <span>{{ item.label }}</span>
	              <small>{{ item.desc }}</small>
	            </button>
	          </nav>

	          <div class="subnav-content">
	          <div v-if="activeAccountSection==='profile'" class="set-block">
	            <h3>👤 个人资料</h3>
	            <div class="key-row">
	              <div class="info">
	                <b>{{ user.display_name || user.username }}</b>
	                <span class="key-prefix">{{ user.email || user.username }}</span>
		                <span class="meta">角色={{ formatRole(user.role) }} · 状态={{ formatAccountStatus(user.status) }} · 全局角色={{ formatGlobalRole(user.global_role) }}</span>
	              </div>
	            </div>
	            <div class="form-grid one">
	              <input class="set-inp" v-model="accountForm.display_name" placeholder="显示名"/>
	              <button class="mini-btn" @click="saveAccount">保存资料</button>
	            </div>
	          </div>

	          <div v-if="activeAccountSection==='security'" class="set-block">
	            <h3>🔒 密码与会话</h3>
	            <div class="form-grid">
	              <input class="set-inp" type="password" v-model="passwordForm.old_password" placeholder="旧密码"/>
	              <input class="set-inp" type="password" v-model="passwordForm.new_password" placeholder="新密码"/>
	              <input class="set-inp" type="password" v-model="passwordForm.confirm_password" placeholder="确认新密码"/>
	              <button class="mini-btn" @click="changePassword">修改密码</button>
	            </div>
	            <div class="key-row">
	              <div class="info">
	                <b>退出当前账号</b>
	                <span class="meta">结束当前浏览器会话，返回登录页</span>
	              </div>
	              <button class="mini-btn bad" @click="logout">退出登录</button>
	            </div>
	          </div>

	          <div v-if="activeAccountSection==='workspace'" class="set-block">
		            <h3>🏢 当前工作区</h3>
	            <div class="key-row">
	              <div class="info">
	                <b>{{ formatWorkspaceName(workspaces.find(w=>String(w.id)===String(currentWorkspaceId))) }}</b>
		                <span class="meta">站点、报告、导出、接口密钥和用量按工作区隔离</span>
	              </div>
	            </div>
	            <div class="form-grid one" v-if="workspaces.length > 1">
	              <select class="set-sel" v-model="currentWorkspaceId" @change="switchWorkspace">
	                <option v-for="w in workspaces" :key="w.id" :value="String(w.id)">{{ formatWorkspaceName(w) }}</option>
	              </select>
	            </div>
	          </div>

	          <div v-if="activeAccountSection==='api_keys'" class="set-block">
	            <h3>🔑 接口密钥</h3>
	            <div class="form-grid">
	              <input class="set-inp" v-model="newKeyName" placeholder="密钥名称"/>
	              <button class="mini-btn" @click="createMyKey">创建密钥</button>
	            </div>
	            <div v-if="createdKey" class="secret-box">{{ createdKey }}</div>
	            <div v-for="k in apiKeys" :key="k.id" class="key-row">
	              <div class="info">
	                <b>{{ k.name }}</b>
	                <span class="key-prefix">{{ k.key_prefix }}</span>
	                <span class="meta">{{ (k.request_count||0).toLocaleString() }} 次调用 · {{ (k.scopes||[]).map(formatScope).join('、') }}</span>
	              </div>
	              <button class="mini-btn bad" v-if="k.active" @click="revokeKey(k.id)">停用</button>
	            </div>
	            <div v-if="!apiKeys.length" style="color:#52527a;font-size:0.78rem;padding:14px 0;text-align:center">暂无接口密钥</div>
	          </div>

	          <div v-if="activeAccountSection==='usage'" class="set-block">
	            <h3>💰 30 天用量</h3>
	            <div v-for="k in (billing.keys||[])" :key="k.id" class="key-row">
	              <div class="info">
	                <b>{{ k.name }}</b>
	                <span class="key-prefix">{{ k.key_prefix }}</span>
	                <span class="meta">{{ (k.request_count||0).toLocaleString() }} 次调用</span>
	              </div>
	            </div>
	            <div v-if="!(billing.keys||[]).length" style="color:#52527a;font-size:0.78rem;padding:14px 0;text-align:center">暂无用量记录</div>
	          </div>
	          </div>
	        </div>
	      </div>

	      <div v-if="toast" class="toast">{{ toast }}</div>
    </template>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>

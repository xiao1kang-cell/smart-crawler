<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>smart-crawler · 遨森标杆数据采集平台</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root{
    --bg:#faf7f2; --card:#ffffff; --line:#efe9e0; --line2:#f3eee6;
    --txt:#3a3340; --mut:#a89f93; --accent:#7c6ce0; --accent-sl:#efe9ff;
    --accent2:#d76b8f; --accent2-sl:#fde9ef;
    --green:#3d6b54; --green-bg:#e6f7ef; --red:#a8466b; --red-bg:#fde9ef;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,"PingFang SC","Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;}
  #app{min-height:100vh;}
  a{color:var(--accent);text-decoration:none;}
  .mk{width:1.3em;height:1.3em;vertical-align:-.26em;margin-right:6px;}

  /* ===== 登录 ===== */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{width:380px;background:var(--card);border-radius:20px;
    padding:40px 36px;box-shadow:0 18px 50px rgba(124,108,224,.14);}
  .login-card .logo{font-size:21px;font-weight:800;}
  .login-card .logo span{color:var(--accent);}
  .login-card .sub{color:var(--mut);font-size:12px;margin:7px 0 28px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--mut);margin-bottom:7px;}
  .field input{width:100%;padding:12px 14px;background:#faf8f5;
    border:1.5px solid var(--line);border-radius:12px;color:var(--txt);font-size:14px;}
  .field input:focus{outline:none;border-color:var(--accent);background:#fff;}
  .login-btn{width:100%;margin-top:10px;padding:12px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
  .login-btn:hover{background:#6a5ad0;}
  .login-btn:disabled{opacity:.5;cursor:not-allowed;}
  .login-err{color:var(--red);font-size:12px;margin-top:12px;min-height:16px;}
  .login-hint{color:#c8bfb2;font-size:11px;margin-top:20px;text-align:center;}

  /* ===== 顶栏 ===== */
  .topbar{background:var(--card);border-bottom:1px solid var(--line);
    padding:13px 24px;display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
  .logo{font-size:16px;font-weight:800;}
  .logo span{color:var(--accent);}
  select{padding:8px 12px;border:1.5px solid var(--line);border-radius:10px;
    font-size:13px;background:#faf8f5;color:var(--txt);}
  select:focus{outline:none;border-color:var(--accent);}
  .site-url{color:var(--mut);font-size:12px;}
  .spacer{flex:1;}
  .who{color:var(--mut);font-size:12px;}
  .who b{color:var(--accent);}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
    background:#3dc98a;margin-right:5px;vertical-align:middle;}
  .btn{padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;
    background:var(--card);color:var(--txt);font-size:12px;cursor:pointer;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.solid{background:var(--accent);color:#fff;border-color:var(--accent);
    font-weight:600;}
  .btn.solid:hover{background:#6a5ad0;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* ===== Tab ===== */
  .tabs{background:var(--card);padding:0 24px;display:flex;gap:6px;
    border-bottom:1px solid var(--line);}
  .tab{padding:13px 18px;cursor:pointer;font-size:14px;color:var(--mut);
    border-bottom:2.5px solid transparent;}
  .tab:hover{color:var(--txt);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
  .main{padding:22px 24px;}

  /* ===== 指标卡（粉彩）===== */
  .cards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .card{border-radius:16px;padding:18px;}
  .card .label{font-size:12px;opacity:.75;}
  .card .value{font-size:27px;font-weight:800;margin-top:9px;}
  .card .sub{font-size:11px;opacity:.6;margin-top:5px;}
  .c0{background:#eef0ff;color:#4a4866;}
  .c1{background:#e6f7ef;color:#3d6b54;}
  .c2{background:#fdeede;color:#a06f33;}
  .c3{background:#fde9ef;color:#a8466b;}
  .c4{background:#e4f1fb;color:#3b6f93;}
  .c5{background:#fbf3da;color:#8a7320;}
  .panel{background:var(--card);border-radius:16px;padding:20px;margin-top:16px;
    box-shadow:0 2px 14px rgba(124,108,224,.05);}
  .panel h3{font-size:14px;margin-bottom:14px;}
  .panel h3 small{color:var(--mut);font-weight:400;margin-left:6px;}
  #chart{width:100%;height:350px;}

  /* ===== 筛选 ===== */
  .filterbar{display:flex;gap:9px;align-items:center;margin-bottom:15px;
    flex-wrap:wrap;}
  .pill{padding:7px 15px;border-radius:20px;background:#f3eee6;cursor:pointer;
    font-size:13px;color:var(--mut);}
  .pill:hover{color:var(--txt);}
  .pill.active{background:var(--accent-sl);color:var(--accent);font-weight:700;}
  input[type=text],input[type=number]{padding:7px 12px;background:#faf8f5;
    border:1.5px solid var(--line);border-radius:10px;font-size:13px;color:var(--txt);}
  input:focus{outline:none;border-color:var(--accent);}

  /* ===== 表格 ===== */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:10px 11px;text-align:left;border-bottom:1px solid var(--line2);
    vertical-align:middle;}
  th{color:var(--mut);font-weight:600;font-size:12px;white-space:nowrap;}
  tbody tr{border-radius:8px;}
  tbody tr:hover{background:#faf8f5;}
  td img{width:46px;height:46px;object-fit:cover;border-radius:10px;
    background:#f3eee6;}
  .badge{padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;}
  .badge.new{background:#e4f1fb;color:#3b6f93;}
  .badge.best{background:#fbf3da;color:#8a7320;}
  .badge.deal{background:var(--accent2-sl);color:var(--accent2);}
  .badge.on_sale,.badge.success{background:var(--green-bg);color:var(--green);}
  .badge.out_of_stock,.badge.failed{background:var(--red-bg);color:var(--red);}
  .badge.running,.badge.pending,.badge.queued{background:#e4f1fb;color:#3b6f93;}
  .price{color:var(--accent);font-weight:700;}
  .price-old{color:#c8bfb2;text-decoration:line-through;font-size:12px;}
  .title-cell{max-width:300px;}
  .title-cell a{color:var(--txt);}
  .title-cell a:hover{color:var(--accent);}
  .pager{display:flex;gap:7px;align-items:center;margin-top:15px;
    justify-content:flex-end;font-size:13px;color:var(--mut);}
  .pager button{padding:5px 12px;border:1.5px solid var(--line);border-radius:9px;
    background:var(--card);cursor:pointer;color:var(--txt);}
  .pager button:disabled{opacity:.4;cursor:not-allowed;}
  .empty{text-align:center;color:#c8bfb2;padding:42px;font-size:13px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  /* ===== 数据源卡片网格（NewAPI 风）===== */
  .ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:14px;}
  .ds-card{background:var(--card);border:1px solid var(--line);border-radius:15px;
    padding:17px 18px;display:flex;flex-direction:column;gap:10px;
    transition:border-color .15s,box-shadow .15s;}
  .ds-card:hover{border-color:var(--accent);
    box-shadow:0 6px 20px rgba(124,108,224,.1);}
  .ds-top{display:flex;align-items:flex-start;gap:10px;}
  .ds-ic{width:38px;height:38px;border-radius:10px;flex:none;display:flex;
    align-items:center;justify-content:center;font-size:19px;}
  .ds-ic.product{background:#eef0ff;} .ds-ic.review{background:#fde9ef;}
  .ds-ic.shopping{background:#fbf3da;}
  .ds-name{font-weight:800;font-size:14.5px;line-height:1.3;}
  .ds-plat{color:var(--mut);font-size:11.5px;margin-top:2px;
    font-family:ui-monospace,monospace;}
  .ds-st{flex:none;font-size:11px;font-weight:700;padding:3px 9px;
    border-radius:7px;}
  .ds-st.online{background:var(--green-bg);color:var(--green);}
  .ds-st.idle{background:#f3eee6;color:var(--mut);}
  .ds-method{font-size:12.5px;color:var(--mut);line-height:1.55;
    background:#faf8f5;border-radius:9px;padding:9px 11px;min-height:54px;}
  .ds-method b{color:var(--accent);font-weight:600;}
  .ds-foot{display:flex;align-items:baseline;gap:6px;
    border-top:1px solid var(--line2);padding-top:9px;}
  .ds-cnt{font-size:22px;font-weight:850;color:var(--txt);}
  .ds-unit{font-size:12px;color:var(--mut);}
  .ds-freq{margin-left:auto;font-size:11px;color:var(--mut);
    background:#f3eee6;border-radius:6px;padding:3px 8px;}
</style>
</head>
<body>
<div id="app">

  <!-- ========== 登录 ========== -->
  <div v-if="!token" class="login-wrap">
    <div class="login-card">
      <div class="logo"><svg class="mk" viewBox="0 0 50 50"><g fill="none" stroke="#7c6ce0" stroke-width="1.7" stroke-linecap="round"><circle cx="25" cy="25" r="20"/><circle cx="25" cy="25" r="12.5"/><circle cx="25" cy="25" r="5"/><path d="M25 4v42M4 25h42M10.5 10.5l29 29M39.5 10.5l-29 29"/></g><circle cx="39.5" cy="10.5" r="4.2" fill="#d76b8f"/></svg>smart<span>·</span>crawler</div>
      <div class="sub">遨森标杆数据采集平台</div>
      <div class="field"><label>账号</label>
        <input type="text" v-model="loginForm.username" @keyup.enter="doLogin"
               placeholder="请输入账号" autofocus /></div>
      <div class="field"><label>密码</label>
        <input type="password" v-model="loginForm.password" @keyup.enter="doLogin"
               placeholder="请输入密码" /></div>
      <button class="login-btn" @click="doLogin" :disabled="logging">
        {{ logging ? '登录中…' : '登 录' }}</button>
      <div class="login-err">{{ loginErr }}</div>
      <div class="login-hint">Aosom 竞品情报 · 授权访问</div>
    </div>
  </div>

  <!-- ========== 主体 ========== -->
  <template v-else>
  <div class="topbar">
    <div class="logo"><svg class="mk" viewBox="0 0 50 50"><g fill="none" stroke="#7c6ce0" stroke-width="1.7" stroke-linecap="round"><circle cx="25" cy="25" r="20"/><circle cx="25" cy="25" r="12.5"/><circle cx="25" cy="25" r="5"/><path d="M25 4v42M4 25h42M10.5 10.5l29 29M39.5 10.5l-29 29"/></g><circle cx="39.5" cy="10.5" r="4.2" fill="#d76b8f"/></svg>smart<span>·</span>crawler</div>
    <select v-model="currentSite" @change="loadAll">
      <option v-for="s in sites" :key="s.site" :value="s.site">
        {{ s.brand }} · {{ s.country }}{{ s.sku_count? '（'+s.sku_count+'）':'' }}
      </option>
    </select>
    <span class="site-url" v-if="site">{{ site.url }}</span>
    <div class="spacer"></div>
    <span class="who"><span class="dot"></span>{{ user.display_name }}</span>
    <span class="who" v-if="site && site.last_crawled">更新 {{ fmt(site.last_crawled) }}</span>
    <button class="btn" @click="exportExcel">⬇ 导出 Excel</button>
    <button class="btn" @click="logout">退出</button>
  </div>

  <div class="tabs">
    <div v-for="t in tabList" :key="t.k" class="tab"
         :class="{active:tab===t.k}" @click="switchTab(t.k)">{{ t.label }}</div>
  </div>

  <div class="main">
    <!-- 总体分析 -->
    <div v-show="tab==='overview'">
      <div class="cards">
        <div class="card c0"><div class="label">在售 SKU</div>
          <div class="value">{{ num(ov.cards.sku_count) }}</div>
          <div class="sub">站点全部在售 SKU</div></div>
        <div class="card c1"><div class="label">新增产品</div>
          <div class="value">{{ num(ov.cards.new_product_count) }}</div>
          <div class="sub">New Arrivals</div></div>
        <div class="card c2"><div class="label">30 天销量</div>
          <div class="value">{{ num(ov.cards.thirty_day_sales) }}</div>
          <div class="sub">评论增量倒推 · 预估</div></div>
        <div class="card c3"><div class="label">30 天收入</div>
          <div class="value">{{ money(ov.cards.thirty_day_revenue) }}</div>
          <div class="sub">销量 × 售价 · 预估</div></div>
        <div class="card c4"><div class="label">30 天流量</div>
          <div class="value">—</div>
          <div class="sub">需第三方数据接入</div></div>
        <div class="card c5"><div class="label">转化率</div>
          <div class="value">—</div>
          <div class="sub">需第三方数据接入</div></div>
      </div>
      <div class="panel">
        <h3>趋势分析 <small>SKU 数 / 新品 / 预估销量 / 预估营收</small></h3>
        <div id="chart"></div>
        <div class="empty" v-if="ov.trends.length<=1">
          趋势图需多日采集数据积累 · 当前 {{ ov.trends.length }} 个采集日</div>
      </div>
    </div>

    <!-- 产品分析 -->
    <div v-show="tab==='products'">
      <div class="panel">
        <div class="filterbar">
          <span class="pill" :class="{active:pTab==='all'}" @click="setPTab('all')">
            所有产品 {{ counts.all }}</span>
          <span class="pill" :class="{active:pTab==='bestseller'}"
            @click="setPTab('bestseller')">畅销 {{ counts.bestseller }}</span>
          <span class="pill" :class="{active:pTab==='new'}" @click="setPTab('new')">
            最新 {{ counts.new }}</span>
          <input type="text" v-model="search" placeholder="搜索标题 / SKU"
            @keyup.enter="loadProducts(1)" style="width:190px" />
          <input type="number" v-model.number="minP" placeholder="最低价" style="width:78px"/>
          <input type="number" v-model.number="maxP" placeholder="最高价" style="width:78px"/>
          <button class="btn solid" @click="loadProducts(1)">筛选</button>
        </div>
        <table>
          <thead><tr>
            <th>#</th><th>图片</th><th>产品标题</th><th>SKU</th><th>属性</th>
            <th>标签</th><th>售价</th><th>原价</th><th>30天销量</th><th>30天营收</th>
            <th>评分</th><th>评论</th><th>状态</th><th>品类</th>
          </tr></thead>
          <tbody>
            <tr v-for="(p,i) in products" :key="p.id">
              <td>{{ (page-1)*pageSize+i+1 }}</td>
              <td><img :src="p.image" loading="lazy" referrerpolicy="no-referrer"/></td>
              <td class="title-cell"><a :href="p.product_url" target="_blank">
                {{ p.title }}</a></td>
              <td>{{ p.sku }}</td>
              <td>{{ attrText(p.attributes) }}</td>
              <td><span v-if="p.label" class="badge"
                :class="p.is_new?'new':'best'">{{ p.label }}</span></td>
              <td><span class="price">{{ money(p.sale_price) }}</span></td>
              <td><span v-if="p.original_price>p.sale_price" class="price-old">
                {{ money(p.original_price) }}</span></td>
              <td>{{ p.thirty_day_sales ?? '—' }}</td>
              <td>{{ p.thirty_day_revenue?money(p.thirty_day_revenue):'—' }}</td>
              <td>{{ p.ratings ?? '—' }}</td>
              <td>{{ p.review_count ?? '—' }}</td>
              <td><span class="badge" :class="p.status">{{ statusText(p.status) }}</span></td>
              <td>{{ p.category_path || '—' }}</td>
            </tr>
          </tbody>
        </table>
        <div class="empty" v-if="!products.length">暂无数据 · 请先采集该站点</div>
        <div class="pager">
          <span>共 {{ total }} 条</span>
          <select v-model.number="pageSize" @change="loadProducts(1)">
            <option :value="20">20</option><option :value="50">50</option>
            <option :value="100">100</option></select>
          <button :disabled="page<=1" @click="loadProducts(page-1)">‹ 上一页</button>
          <span>{{ page }} / {{ Math.max(1,Math.ceil(total/pageSize)) }}</span>
          <button :disabled="page>=Math.ceil(total/pageSize)"
            @click="loadProducts(page+1)">下一页 ›</button>
        </div>
      </div>
    </div>

    <!-- 销售促销 -->
    <div v-show="tab==='promotions'">
      <div class="panel">
        <h3>促销活动 <small>售价低于原价的在售商品</small></h3>
        <table>
          <thead><tr>
            <th>#</th><th>SKU</th><th>产品标题</th><th>图片</th><th>类型</th>
            <th>折扣</th><th>原价</th><th>活动价</th><th>检测时间</th>
          </tr></thead>
          <tbody>
            <tr v-for="(p,i) in promotions" :key="p.id">
              <td>{{ i+1 }}</td><td>{{ p.sku }}</td>
              <td class="title-cell">{{ p.product_title }}</td>
              <td><img :src="p.product_image" loading="lazy"
                referrerpolicy="no-referrer"/></td>
              <td>{{ p.promotion_type }}</td>
              <td><span class="badge deal">-{{ p.discount_percent }}%</span></td>
              <td><span class="price-old">{{ money(p.original_price) }}</span></td>
              <td><span class="price">{{ money(p.promotion_price) }}</span></td>
              <td>{{ fmt(p.detected_time) }}</td>
            </tr>
          </tbody>
        </table>
        <div class="empty" v-if="!promotions.length">当前站点未检测到价格促销</div>
      </div>
    </div>

    <!-- 数据源 -->
    <div v-show="tab==='datasources'">
      <div class="panel">
        <h3>数据源总览
          <small>{{ datasources.length }} 个源 · 商品站 / 评论平台 / Google Shopping</small>
        </h3>
        <div class="filterbar">
          <span class="pill" :class="{active:dsTab==='all'}" @click="dsTab='all'">
            全部 {{ datasources.length }}</span>
          <span class="pill" :class="{active:dsTab==='product'}" @click="dsTab='product'">
            商品站 {{ dsCount('product') }}</span>
          <span class="pill" :class="{active:dsTab==='review'}" @click="dsTab='review'">
            评论平台 {{ dsCount('review') }}</span>
          <span class="pill" :class="{active:dsTab==='shopping'}" @click="dsTab='shopping'">
            Google Shopping {{ dsCount('shopping') }}</span>
          <span style="margin-left:auto;color:var(--mut);font-size:12px;">
            在线 {{ dsOnline }} · 累计 {{ num(dsTotalCount) }} 条样本</span>
        </div>
        <div class="ds-grid">
          <div class="ds-card" v-for="d in dsFiltered" :key="d.id">
            <div class="ds-top">
              <div class="ds-ic" :class="d.type">
                {{ d.type==='product'?'🛒':d.type==='review'?'💬':'🔍' }}</div>
              <div style="flex:1;min-width:0;">
                <div class="ds-name">{{ d.name }}</div>
                <div class="ds-plat">{{ d.platform }}</div>
              </div>
              <span class="ds-st" :class="d.status">
                {{ d.status==='online'?'● 在线':'○ 待采' }}</span>
            </div>
            <div class="ds-method">{{ d.method }}</div>
            <div class="ds-foot">
              <span class="ds-cnt">{{ num(d.count) }}</span>
              <span class="ds-unit">{{ d.unit }}</span>
              <span class="ds-freq">⟳ {{ d.freq }}</span>
            </div>
          </div>
        </div>
        <div class="empty" v-if="!datasources.length">数据源加载中…</div>
      </div>
    </div>

    <!-- 采集任务 -->
    <div v-show="tab==='jobs'">
      <div class="grid2">
        <div class="card c0"><div class="label">已配置站点</div>
          <div class="value">{{ sites.length }}</div>
          <div class="sub">9 品牌 · 12 国</div></div>
        <div class="card c1"><div class="label">代理池</div>
          <div class="value">{{ proxy.residential||0 }}+{{ proxy.datacenter||0 }}</div>
          <div class="sub">住宅 + 数据中心 IP</div></div>
      </div>
      <div class="panel">
        <h3>采集任务看板
          <button class="btn solid" style="float:right" @click="trigger"
            :disabled="triggering">▶ 采集当前站点</button>
          <button class="btn" style="float:right;margin-right:8px"
            @click="loadJobs">⟳ 刷新</button></h3>
        <table>
          <thead><tr>
            <th>#</th><th>站点</th><th>状态</th><th>商品数</th><th>新品</th>
            <th>促销</th><th>成功率</th><th>耗时(s)</th><th>开始时间</th>
          </tr></thead>
          <tbody>
            <tr v-for="j in jobs" :key="j.id">
              <td>{{ j.id }}</td><td>{{ j.site }}</td>
              <td><span class="badge" :class="j.status">{{ j.status }}</span></td>
              <td>{{ j.products_count }}</td><td>{{ j.new_count }}</td>
              <td>{{ j.promotion_count }}</td>
              <td>{{ j.success_rate!=null?j.success_rate+'%':'—' }}</td>
              <td>{{ j.duration_sec ?? '—' }}</td>
              <td>{{ fmt(j.started_at) }}</td>
            </tr>
          </tbody>
        </table>
        <div class="empty" v-if="!jobs.length">暂无采集任务记录</div>
      </div>
    </div>

    <!-- API 接入 -->
    <div v-show="tab==='api'">
      <div class="panel">
        <h3>数据输出 API <small>面向 AI Agent 的结构化数据接口 · v1</small></h3>
        <p style="color:var(--mut);font-size:13px;line-height:1.7;">
          Agent / 外部系统用 <b>API 密钥</b>调用 <code>/api/v1/*</code> 拉取结构化数据，
          统一信封、稳定 schema。鉴权头：<code>X-API-Key: sck_…</code><br/>
          常用端点：<code>GET /api/v1/products</code> ·
          <code>/api/v1/promotions</code> · <code>/api/v1/site/{site}</code> ·
          完整文档 <a href="/docs" target="_blank">/docs</a></p>
      </div>
      <div class="panel">
        <h3>API 密钥
          <button class="btn solid" style="float:right" @click="createKey">
            + 新建密钥</button></h3>
        <div v-if="newKey" style="background:#e6f7ef;border-radius:10px;
          padding:12px;margin-bottom:12px;font-size:13px;">
          ✓ 新密钥（仅此一次显示，请立即保存）：<br/>
          <code style="color:var(--green);font-weight:700;">{{ newKey }}</code>
        </div>
        <table>
          <thead><tr>
            <th>#</th><th>名称</th><th>密钥前缀</th><th>状态</th>
            <th>调用次数</th><th>最后使用</th><th>操作</th>
          </tr></thead>
          <tbody>
            <tr v-for="k in apiKeys" :key="k.id">
              <td>{{ k.id }}</td><td>{{ k.name }}</td>
              <td>{{ k.key_prefix }}</td>
              <td><span class="badge" :class="k.active?'on_sale':'out_of_stock'">
                {{ k.active?'启用':'已撤销' }}</span></td>
              <td>{{ k.request_count }}</td>
              <td>{{ fmt(k.last_used) }}</td>
              <td><button v-if="k.active" class="btn" @click="revokeKey(k.id)">
                撤销</button></td>
            </tr>
          </tbody>
        </table>
        <div class="empty" v-if="!apiKeys.length">暂无 API 密钥</div>
      </div>
    </div>
  </div>
  </template>
</div>

<script>
const { createApp } = Vue;
createApp({
  data(){return{
    token: localStorage.getItem("sc_token")||"",
    user: JSON.parse(localStorage.getItem("sc_user")||"{}"),
    loginForm:{username:"",password:""}, logging:false, loginErr:"",
    sites:[], currentSite:"", tab:"overview", pTab:"all",
    tabList:[{k:"overview",label:"总体分析"},{k:"products",label:"产品分析"},
      {k:"promotions",label:"销售促销"},{k:"datasources",label:"数据源"},
      {k:"jobs",label:"采集任务"},{k:"api",label:"API 接入"}],
    datasources:[], dsTab:"all",
    apiKeys:[], newKeyName:"", newKey:"",
    ov:{cards:{},trends:[]}, products:[], total:0, page:1, pageSize:20,
    counts:{all:0,bestseller:0,new:0}, search:"", minP:null, maxP:null,
    promotions:[], jobs:[], proxy:{}, triggering:false, chart:null,
  };},
  computed:{
    site(){ return this.sites.find(s=>s.site===this.currentSite); },
    dsFiltered(){ return this.dsTab==='all'?this.datasources
      :this.datasources.filter(d=>d.type===this.dsTab); },
    dsOnline(){ return this.datasources.filter(d=>d.status==='online').length; },
    dsTotalCount(){ return this.datasources.reduce((a,d)=>a+(d.count||0),0); },
  },
  async mounted(){ if(this.token) await this.boot(); },
  methods:{
    num(v){return (v??0).toLocaleString();},
    money(v){return v==null?"—":"$"+Number(v).toLocaleString(undefined,
      {minimumFractionDigits:2,maximumFractionDigits:2});},
    fmt(v){return v?v.replace("T"," ").slice(0,16):"—";},
    attrText(a){return a?Object.entries(a).map(([k,x])=>k+":"+x).join(" / "):"—";},
    statusText(s){return{on_sale:"在售",out_of_stock:"缺货",
      discontinued:"下架"}[s]||s;},
    async api(path,opts){
      const o=opts||{}; o.headers=Object.assign(
        {"Authorization":"Bearer "+this.token},o.headers||{});
      const r=await fetch(path,o);
      if(r.status===401){ this.logout(); throw new Error("登录已过期"); }
      return r.json();
    },
    async doLogin(){
      this.logging=true; this.loginErr="";
      try{
        const r=await fetch("/api/login",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(this.loginForm)});
        if(!r.ok){ this.loginErr="账号或密码错误"; return; }
        const d=await r.json();
        this.token=d.token; this.user={display_name:d.display_name,role:d.role};
        localStorage.setItem("sc_token",d.token);
        localStorage.setItem("sc_user",JSON.stringify(this.user));
        await this.boot();
      }catch(e){ this.loginErr="登录失败："+e.message; }
      finally{ this.logging=false; }
    },
    logout(){ this.token=""; localStorage.removeItem("sc_token");
      localStorage.removeItem("sc_user"); },
    async boot(){
      this.sites=await this.api("/api/sites");
      if(this.sites.length){
        this.currentSite=(this.sites.find(s=>s.sku_count>0)||this.sites[0]).site;
        await this.loadAll();
      }
    },
    async loadAll(){
      await Promise.all([this.loadOverview(),this.loadCounts(),
        this.loadProducts(1),this.loadPromotions(),this.loadJobs(),this.loadProxy()]);
    },
    switchTab(k){ this.tab=k;
      if(k==='overview') this.$nextTick(this.renderChart);
      if(k==='api') this.loadKeys();
      if(k==='datasources'&&!this.datasources.length) this.loadDatasources(); },
    dsCount(t){ return this.datasources.filter(d=>d.type===t).length; },
    async loadDatasources(){
      try{ this.datasources=await this.api("/api/datasources"); }
      catch(e){ this.datasources=[]; }
    },
    async loadOverview(){
      this.ov=await this.api(`/api/sites/${this.currentSite}/overview`);
      this.$nextTick(this.renderChart);
    },
    async loadCounts(){
      for(const t of["all","bestseller","new"]){
        const r=await this.api(`/api/products?site=${this.currentSite}`+
          `&tab=${t}&page_size=1`);
        this.counts[t]=r.total;
      }
    },
    setPTab(t){ this.pTab=t; this.loadProducts(1); },
    async loadProducts(p){
      this.page=p;
      let u=`/api/products?site=${this.currentSite}&tab=${this.pTab}`+
        `&page=${p}&page_size=${this.pageSize}`;
      if(this.search) u+=`&search=${encodeURIComponent(this.search)}`;
      if(this.minP!=null) u+=`&min_price=${this.minP}`;
      if(this.maxP!=null) u+=`&max_price=${this.maxP}`;
      const r=await this.api(u);
      this.products=r.items; this.total=r.total;
    },
    async loadPromotions(){
      const r=await this.api(`/api/promotions?site=${this.currentSite}`);
      this.promotions=r.items;
    },
    async loadJobs(){ this.jobs=await this.api("/api/jobs"); },
    async loadProxy(){ try{ this.proxy=await this.api("/api/proxy-status"); }
      catch(e){ this.proxy={}; } },
    async loadKeys(){ try{ this.apiKeys=await this.api("/api/keys"); }
      catch(e){ this.apiKeys=[]; } },
    async createKey(){
      const name=prompt("密钥名称（用途备注）：","Agent 接入");
      if(!name) return;
      const r=await this.api("/api/keys",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name})});
      this.newKey=r.key||""; this.loadKeys();
    },
    async revokeKey(id){
      if(!confirm("确认撤销该密钥？撤销后立即失效。")) return;
      await this.api(`/api/keys/${id}`,{method:"DELETE"});
      this.loadKeys();
    },
    async trigger(){
      this.triggering=true;
      await this.api(`/api/jobs/trigger?site=${this.currentSite}`,{method:"POST"});
      setTimeout(()=>{ this.triggering=false; this.loadJobs(); },1500);
      alert("采集任务已加入后台队列，稍后点「刷新」查看结果。");
    },
    exportExcel(){
      window.open(`/api/export/products?site=${this.currentSite}`+
        `&token=${encodeURIComponent(this.token)}`,"_blank");
    },
    renderChart(){
      const el=document.getElementById("chart");
      if(!el||!this.ov.trends||!this.ov.trends.length) return;
      if(!this.chart) this.chart=echarts.init(el,null,{renderer:"canvas"});
      const t=this.ov.trends;
      this.chart.setOption({
        backgroundColor:"transparent",
        textStyle:{color:"#a89f93"},
        tooltip:{trigger:"axis",backgroundColor:"#fff",borderColor:"#efe9e0",
          textStyle:{color:"#3a3340"}},
        legend:{data:["SKU数","新品","预估销量","预估营收"],
          textStyle:{color:"#a89f93"}},
        grid:{left:52,right:52,top:42,bottom:34},
        xAxis:{type:"category",data:t.map(x=>x.date),
          axisLine:{lineStyle:{color:"#efe9e0"}},axisLabel:{color:"#a89f93"}},
        yAxis:[{type:"value",splitLine:{lineStyle:{color:"#f3eee6"}},
          axisLabel:{color:"#a89f93"}},
          {type:"value",splitLine:{show:false},axisLabel:{color:"#a89f93"}}],
        color:["#7c6ce0","#3dc98a","#e0a04a","#d76b8f"],
        series:[
          {name:"SKU数",type:"line",smooth:true,symbol:"circle",symbolSize:6,
            data:t.map(x=>x.sku_count)},
          {name:"新品",type:"line",smooth:true,symbol:"circle",symbolSize:6,
            data:t.map(x=>x.new_product_count)},
          {name:"预估销量",type:"line",smooth:true,symbol:"circle",symbolSize:6,
            data:t.map(x=>x.estimated_sales)},
          {name:"预估营收",type:"line",smooth:true,symbol:"circle",symbolSize:6,
            yAxisIndex:1,data:t.map(x=>x.estimated_revenue)},
        ],
      });
    },
  },
}).mount("#app");
</script>
</body>
</html>

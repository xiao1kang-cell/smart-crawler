# smart-crawler 标杆站点配置 —— 全 46 站（P0 20 + P1 35 ... 实际 P0 20 / P1 23 / P2 3）
# platform: shopify | nuxt | vue_spa | generic
# proxy_tier: none | datacenter | residential
# generic 站点可选: sitemap / product_match / exclude_match / max_products

settings:
  review_rate: 0.025
  request_delay: 1.2
  freq_products: "0 2 * * *"
  freq_reviews: "0 4 * * 1"
  freq_shopping: "0 5 * * 1"
  default_freq: "0 2 * * *"
  # Dashboard 隐藏站点（采集器仍保留，只是不在 dashboard 展示）
  # 现阶段隐藏头部反爬大平台（需 residential 代理 + 持续投入，未稳定产出）
  # ikea / etsy 保留：已配住宅代理，需把采集器跑到上限
  hidden_sites:
    - aliexpress_global
    - allegro_pl
    - bestbuy_us
    - ebay_us
    - etsy_us
    - otto_de
    - target_us
    - vidaxl_ca
    - walmart_us
    - wayfair_us


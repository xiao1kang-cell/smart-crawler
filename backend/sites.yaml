# smart-crawler 标杆站点配置 —— P0 三品牌 20 站
# proxy_tier: none(直连) | datacenter(数据中心代理) | residential(住宅代理)
# crawl_freq: 采集频率 cron 表达式（APScheduler），默认每日 02:00 当地低峰

settings:
  review_rate: 0.025          # 销量估算评论率（家居类经验值 2.5%，规格 Q-001）
  request_delay: 1.5          # 同站请求间隔（秒）
  default_freq: "0 2 * * *"   # 默认每日 02:00

sites:
  # ---- SONGMICS（致欧）— Shopify，反爬低，直连 ----
  - site: songmics_us
    brand: SONGMICS
    country: US
    url: https://www.songmics.com/
    platform: shopify
    proxy_tier: none

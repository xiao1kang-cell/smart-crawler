# 口碑评论渠道配置 —— 模块二（规格 §3.3）
# Aosom 自身在各评论平台的页面。platform 决定用哪个采集器。

channels:
  # ===== Trustpilot（9 渠道）=====
  - {site: aosom_us, platform: trustpilot, country: US, domain: www.aosom.com,  host: www.trustpilot.com}
  - {site: aosom_ca, platform: trustpilot, country: CA, domain: aosom.ca,       host: www.trustpilot.com}
  - {site: aosom_uk, platform: trustpilot, country: UK, domain: aosom.co.uk,    host: www.trustpilot.com}
  - {site: aosom_ie, platform: trustpilot, country: IE, domain: www.aosom.ie,   host: ie.trustpilot.com}
  - {site: aosom_de, platform: trustpilot, country: DE, domain: aosom.de,       host: www.trustpilot.com}
  - {site: aosom_fr, platform: trustpilot, country: FR, domain: aosom.fr,       host: www.trustpilot.com}
  - {site: aosom_it, platform: trustpilot, country: IT, domain: aosom.it,       host: www.trustpilot.com}
  - {site: aosom_es, platform: trustpilot, country: ES, domain: aosom.es,       host: www.trustpilot.com}
  - {site: aosom_pt, platform: trustpilot, country: PT, domain: aosom.pt,       host: www.trustpilot.com}

  # ===== Google Map（7 渠道，规格 §3.3）=====
  - {site: aosom_us, platform: google_map, country: US, query: "Aosom LLC"}
  - {site: aosom_ca, platform: google_map, country: CA, query: "AOSOM CANADA INC."}
  - {site: aosom_uk, platform: google_map, country: UK, query: "aosom uk"}
  - {site: aosom_ie, platform: google_map, country: IE, query: "Aosom Ireland Ltd"}
  - {site: aosom_de, platform: google_map, country: DE, query: "MH Handel GmbH"}
  - {site: aosom_fr, platform: google_map, country: FR, query: "Aosom siege social"}
  - {site: aosom_es, platform: google_map, country: ES, query: "Aosom Els Hostalets de Balenya"}

  # ===== Reviews.io（UK，公开 API）=====
  - {site: aosom_uk, platform: reviews_io, country: UK, store: aosom-uk}

  # ===== 可导出平台：走 feed 导入（规格 F2-007，非爬取）=====
  # TrustedShop（DE）/ Opiniones Verificadas（ES/PT）—— 平台后台导出 CSV/Excel，
  # 用 `cli reviews-import --file X --platform trustedshop --site aosom_de` 导入
  # Trusted.ro（RO）评论走 AJAX，采集器待补

settings:
  max_pages: 20          # 每渠道最多翻页数（trustpilot ~20/页 / reviews_io 100/页）

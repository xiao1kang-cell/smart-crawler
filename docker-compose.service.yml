# smart-crawler 服务化部署编排（NAS 目标架构）
# —— 对应 docs/架构设计.md。需先完成「落地步骤 §10 第 1 步」代码改造再启用。
# 部署：在 NAS 上  docker compose -f docker-compose.service.yml up -d
#       多 worker： docker compose -f docker-compose.service.yml up -d --scale worker=3
#
# 所有持久化数据落 NAS 大盘 /volume1/smart-crawler/

x-app: &app-base
  build: .
  image: smart-crawler:latest
  environment: &app-env
    DATABASE_URL: postgresql+psycopg://sc:${PG_PASSWORD:-changeme}@postgres:5432/smartcrawler
    SC_SECRET: ${SC_SECRET:-change-me-strong-random}
    SNAPSHOT_DIR: /data/snapshots
    HOMARY_LIMIT: ${HOMARY_LIMIT:-500}
    COSTWAY_PAGES_PER_CAT: ${COSTWAY_PAGES_PER_CAT:-3}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ---- 数据库 ----
  postgres:
    image: postgres:16-alpine
    container_name: sc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sc
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
      POSTGRES_DB: smartcrawler
    volumes:
      - /volume1/smart-crawler/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc -d smartcrawler"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Web：API + 看板 ----
  web:
    <<: *app-base
    container_name: sc-web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8077
    environment:
      <<: *app-env
      RUN_SCHEDULER: "0"          # 调度交给独立容器
    ports:
      - "8077:8077"
    volumes:
      - /volume1/smart-crawler/snapshots:/data/snapshots
      - /volume1/smart-crawler/exports:/data/exports
      - /volume1/smart-crawler/config/sites.yaml:/app/backend/sites.yaml:ro
      - /volume1/smart-crawler/config/proxies.txt:/app/backend/proxies.txt:ro

  # ---- 调度：把采集任务投递到队列 ----
  scheduler:
    <<: *app-base
    container_name: sc-scheduler
    command: python -m app.scheduler_main
    volumes:
      - /volume1/smart-crawler/config/sites.yaml:/app/backend/sites.yaml:ro

  # ---- Worker：采集执行器，可水平扩展 ----
  worker:
    <<: *app-base
    command: python -m app.worker
    volumes:
      - /volume1/smart-crawler/snapshots:/data/snapshots
      - /volume1/smart-crawler/config/sites.yaml:/app/backend/sites.yaml:ro
      - /volume1/smart-crawler/config/proxies.txt:/app/backend/proxies.txt:ro
      - /volume1/smart-crawler/logs:/data/logs

  # ---- 备份：每日 pg_dump + 快照清理 ----
  backup:
    image: postgres:16-alpine
    container_name: sc-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - /volume1/smart-crawler/backups:/backups
    entrypoint: ["sh", "-c", "while true; do
      pg_dump -h postgres -U sc smartcrawler | gzip > /backups/sc_$$(date +%Y%m%d).sql.gz;
      find /backups -name '*.sql.gz' -mtime +30 -delete;
      sleep 86400; done"]

  # ---- Cloudflare Tunnel：smartcrawler.io 入口 ----
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sc-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - web
